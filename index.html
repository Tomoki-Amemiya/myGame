<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>めちゃくちゃヤギ物理ゲーム</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #87ceeb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.65);
      z-index: 10;
    }

    #topBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    #scorePanel,
    #missionPanel,
    #helpPanel {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }

    #scorePanel {
      min-width: 135px;
    }

    #score {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    #combo {
      margin-top: 4px;
      font-size: 14px;
      color: #ffe66d;
    }

    #missionPanel {
      max-width: 45vw;
      text-align: center;
      font-size: 14px;
      line-height: 1.45;
    }

    #missionTitle {
      font-weight: 800;
      color: #a8ffb0;
      margin-bottom: 2px;
    }

    #missionPanel {
      pointer-events: auto;
      cursor: pointer;
    }

    #missionText {
      font-size: 13px;
    }

    #missionHint {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.85;
    }

    #missionOverlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 18px;
    }

    #missionOverlay.hidden {
      display: none;
    }

    #missionCard {
      width: min(92vw, 620px);
      max-height: 82vh;
      overflow: auto;
      background: rgba(20, 24, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.45);
    }

    #missionCardHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    #missionCardHeader h2 {
      margin: 0;
      font-size: 22px;
    }

    #missionCloseButton {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 900;
      background: white;
      color: #222;
    }

    #missionList {
      display: grid;
      gap: 10px;
    }

    .missionItem {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .missionItem.completed {
      background: rgba(80, 220, 120, 0.18);
      border-color: rgba(120, 255, 160, 0.45);
    }

    .missionMark {
      font-size: 22px;
      line-height: 1.2;
      text-align: center;
    }

    .missionName {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .missionDesc {
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.45;
    }

    .missionProgress {
      margin-top: 6px;
      font-size: 12px;
      color: #ffe66d;
    }

    #helpPanel {
      font-size: 12px;
      line-height: 1.45;
      max-width: 310px;
    }

    #message {
      position: absolute;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 220px;
      max-width: 80vw;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      text-align: center;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(4px);
    }

    #missionClearToast {
      position: fixed;
      top: 120px;
      left: 50%;
      transform: translateX(-50%) scale(0.96);
      z-index: 80;
      min-width: 280px;
      max-width: 88vw;
      padding: 16px 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 232, 95, 0.96), rgba(255, 152, 67, 0.96));
      color: #2b1600;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #missionClearToast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #missionClearToast .small {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.9;
    }

    #controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    #joystickArea {
      position: absolute;
      left: 22px;
      bottom: 28px;
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.32);
      pointer-events: auto;
      touch-action: none;
    }

    #joystickKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    #actionButtons {
      position: absolute;
      right: 18px;
      bottom: 24px;
      display: grid;
      grid-template-columns: 74px 74px;
      grid-template-rows: 74px 74px 74px;
      gap: 10px;
      pointer-events: auto;
    }

    .actionButton {
      border: none;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.84);
      color: #111;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.32);
      touch-action: none;
    }

    .actionButton:active {
      transform: scale(0.94);
      background: white;
    }

    #btnJump {
      grid-column: 2;
      grid-row: 3;
      background: rgba(124, 217, 255, 0.9);
    }

    #btnHeadbutt {
      grid-column: 1;
      grid-row: 2;
      background: rgba(255, 230, 109, 0.92);
    }

    #btnLick {
      grid-column: 2;
      grid-row: 2;
      background: rgba(255, 139, 179, 0.92);
    }

    #btnDash {
      grid-column: 1;
      grid-row: 3;
      background: rgba(168, 255, 176, 0.92);
    }

    #btnReset {
      grid-column: 2;
      grid-row: 1;
      background: rgba(255, 170, 122, 0.92);
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(180deg, #73c7ff, #87ceeb 42%, #89d06b 42%);
      color: white;
      text-align: center;
    }

    #startCard {
      width: min(90vw, 560px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    #startCard h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #startCard p {
      margin: 8px 0;
      line-height: 1.6;
      font-size: 14px;
    }

    #startButton {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: 900;
      background: #4caf50;
      color: white;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    #startButton:active {
      transform: scale(0.96);
    }

    .floatingScore {
      position: fixed;
      z-index: 30;
      color: #fff36d;
      font-weight: 900;
      font-size: 22px;
      text-shadow: 0 2px 5px black;
      pointer-events: none;
      animation: floatScore 0.9s ease-out forwards;
    }

    @keyframes floatScore {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -120%) scale(1.3);
      }
    }

    @media (max-width: 760px) {
      #helpPanel {
        display: none;
      }

      #missionPanel {
        max-width: 55vw;
        font-size: 12px;
      }

      #score {
        font-size: 22px;
      }

      #joystickArea {
        width: 132px;
        height: 132px;
        left: 16px;
        bottom: 20px;
      }

      #actionButtons {
        right: 12px;
        bottom: 16px;
        grid-template-columns: 68px 68px;
        grid-template-rows: 68px 68px 68px;
      }

      .actionButton {
        border-radius: 20px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="topBar">
      <div id="scorePanel">
        <div>スコア</div>
        <div id="score">0</div>
        <div id="combo">COMBO x1.0</div>
      </div>

      <div id="missionPanel">
        <div id="missionTitle">MISSION</div>
        <div id="missionText">ミッション確認中...</div>
        <div id="missionHint">タップで一覧</div>
      </div>

      <div id="helpPanel">
        <b>PC操作</b><br />
        WASD：移動 / Space：ジャンプ<br />
        E：頭突き / Q：ベロ / Shift：ダッシュ<br />
        R：リセット / ドラッグ：カメラ回転
      </div>
    </div>

    <div id="message"></div>
    <div id="missionClearToast"></div>
  </div>

  <div id="controls">
    <div id="joystickArea">
      <div id="joystickKnob"></div>
    </div>

    <div id="actionButtons">
      <button id="btnJump" class="actionButton">JUMP</button>
      <button id="btnHeadbutt" class="actionButton">頭突き</button>
      <button id="btnLick" class="actionButton">ベロ</button>
      <button id="btnDash" class="actionButton">DASH</button>
      <button id="btnReset" class="actionButton">RESET</button>
    </div>
  </div>

  <div id="startOverlay">
    <div id="startCard">
      <h1>めちゃくちゃヤギ物理ゲーム</h1>
      <p>
        ヤギ風キャラを操作して、箱・車・看板を吹き飛ばそう。<br />
        頭突き、ジャンプ、ベロつかみ、物理破壊入りの3Dミニゲームです。
      </p>
      <p>
        スマホ：左スティックで移動、右ボタンでアクション。<br />
        PC：WASD / Space / E / Q / Shift / R。
      </p>
      <button id="startButton">START</button>
    </div>
  </div>

  <div id="missionOverlay" class="hidden">
    <div id="missionCard">
      <div id="missionCardHeader">
        <h2>MISSION一覧</h2>
        <button id="missionCloseButton">閉じる</button>
      </div>
      <div id="missionList"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import * as CANNON from "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js";

    // =========================================================
    //  基本設定
    // =========================================================

    const canvas = document.getElementById("game");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const missionTextEl = document.getElementById("missionText");
    const missionPanelEl = document.getElementById("missionPanel");
    const missionOverlayEl = document.getElementById("missionOverlay");
    const missionListEl = document.getElementById("missionList");
    const missionCloseButtonEl = document.getElementById("missionCloseButton");
    const messageEl = document.getElementById("message");
    const missionClearToastEl = document.getElementById("missionClearToast");
    const startOverlay = document.getElementById("startOverlay");
    const startButton = document.getElementById("startButton");

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: "high-performance"
    });

    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    scene.fog = new THREE.Fog(0x87ceeb, 45, 120);

    const camera = new THREE.PerspectiveCamera(
      65,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );

    const clock = new THREE.Clock();

    const world = new CANNON.World({
      gravity: new CANNON.Vec3(0, -9.82, 0)
    });

    world.solver.iterations = 12;
    world.solver.tolerance = 0.001;

    world.allowSleep = true;
    world.broadphase = new CANNON.SAPBroadphase(world);

    const defaultMaterial = new CANNON.Material("default");
    const groundMaterial = new CANNON.Material("ground");
    const bouncyMaterial = new CANNON.Material("bouncy");

    world.defaultContactMaterial = new CANNON.ContactMaterial(
      defaultMaterial,
      defaultMaterial,
      {
        friction: 0.45,
        restitution: 0.28
      }
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(defaultMaterial, groundMaterial, {
        friction: 0.8,
        restitution: 0.18
      })
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(bouncyMaterial, groundMaterial, {
        // 自キャラが地面に引っかかる感じを減らす
        friction: 0.08,
        restitution: 0.02
      })
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(bouncyMaterial, defaultMaterial, {
        // 箱・車・板・NPCに触れたときに引っかかりすぎないようにする
        friction: 0.12,
        restitution: 0.02
      })
    );

    // =========================================================
    //  ゲーム状態
    // =========================================================

    const state = {
      started: false,
      startProtectionTimer: 0,
      score: 0,
      comboCount: 0,
      comboMultiplier: 1,
      comboTimer: 0,
      destroyedCount: 0,
      destroyedByName: {},
      headbuttCooldown: 0,
      jumpCooldown: 0,
      dashTime: 0,
      dashCooldown: 0,
      cameraYaw: 0,
      cameraPitch: 0.08,
      isGrounded: false,
      lickTarget: null,
      lickLine: null,
      missionCompleted: false,
      hasLegendarySword: false,
      messageTimer: 0
    };

    const keys = {
      forward: false,
      back: false,
      left: false,
      right: false,
      jump: false,
      dash: false
    };

    const PLAYER_START_POSITION = new THREE.Vector3(0, 4, 0);
    // 落下してしばらく落ちてからリセットされる高さ
    const FALL_RESET_Y = -35;

    const joystick = {
      active: false,
      pointerId: null,
      x: 0,
      y: 0
    };

    const gameObjects = [];
    const destructibles = [];
    const staticPlatforms = [];

    // ランダム移動するNPC
    // gameObjectsにも登録するため、既存のベロ・頭突き対象として扱える
    const npcs = [];

    // 爆発エフェクト
    const explosionEffects = [];

    // =========================================================
    //  汎用関数
    // =========================================================

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function rand(min, max) {
      return min + Math.random() * (max - min);
    }

    function showMessage(text) {
      messageEl.textContent = text;
      messageEl.classList.add("show");
      state.messageTimer = 1.8;
    }

    function showMissionClearToast(title, reward, count = 1) {
      if (!missionClearToastEl) return;

      const titleText = count > 1
        ? `MISSION CLEAR x${count}`
        : `MISSION CLEAR`;

      missionClearToastEl.innerHTML = `
        <div>${titleText}</div>
        <div>${title}</div>
        <div class="small">追加報酬 +${reward}</div>
      `;

      missionClearToastEl.classList.add("show");

      setTimeout(() => {
        missionClearToastEl.classList.remove("show");
      }, 2600);
    }

    function updateMessage(delta) {
      if (state.messageTimer > 0) {
        state.messageTimer -= delta;
        if (state.messageTimer <= 0) {
          messageEl.classList.remove("show");
        }
      }
    }

    function addScore(points, worldPosition, options = {}) {
      const gained = Math.round(points * state.comboMultiplier);
      state.score += gained;
      state.comboCount += 1;
      state.comboTimer = 2.3;

      if (state.comboCount >= 11) {
        state.comboMultiplier = 3;
      } else if (state.comboCount >= 6) {
        state.comboMultiplier = 2;
      } else if (state.comboCount >= 3) {
        state.comboMultiplier = 1.5;
      } else {
        state.comboMultiplier = 1;
      }

      scoreEl.textContent = String(state.score);
      comboEl.textContent = `COMBO x${state.comboMultiplier.toFixed(1)} / ${state.comboCount}`;

      if (worldPosition) {
        spawnFloatingScore(gained, worldPosition);
      }

      if (!options.skipMissionUpdate && state.started) {
        updateMission();
      }
    }

    function updateCombo(delta) {
      if (state.comboTimer > 0) {
        state.comboTimer -= delta;
        if (state.comboTimer <= 0) {
          state.comboCount = 0;
          state.comboMultiplier = 1;
          comboEl.textContent = "COMBO x1.0";
        }
      }
    }

    function spawnFloatingScore(points, worldPosition) {
      const projected = worldPosition.clone().project(camera);
      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      const el = document.createElement("div");
      el.className = "floatingScore";
      el.textContent = `+${points}`;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      document.body.appendChild(el);

      setTimeout(() => {
        el.remove();
      }, 950);
    }

    function cannonToThreeVec3(v) {
      return new THREE.Vector3(v.x, v.y, v.z);
    }

    function threeToCannonVec3(v) {
      return new CANNON.Vec3(v.x, v.y, v.z);
    }

    function syncMeshWithBody(mesh, body) {
      mesh.position.set(body.position.x, body.position.y, body.position.z);
      mesh.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);
    }

    function enableShadowForObject3D(object3d) {
      object3d.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
    }

    function createNoiseTexture({
      baseColor = "#ffffff",
      noiseColor = "#cccccc",
      size = 256,
      cellSize = 8,
      lineColor = null,
      lineEvery = 32
    } = {}) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");

      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);

      for (let y = 0; y < size; y += cellSize) {
        for (let x = 0; x < size; x += cellSize) {
          const alpha = Math.random() * 0.18;
          ctx.fillStyle = noiseColor;
          ctx.globalAlpha = alpha;
          ctx.fillRect(x, y, cellSize, cellSize);
        }
      }

      ctx.globalAlpha = 1;

      if (lineColor) {
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 1;

        for (let i = 0; i <= size; i += lineEvery) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, size);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(size, i);
          ctx.stroke();
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.anisotropy = 4;
      texture.needsUpdate = true;

      return texture;
    }

    function createStripeTexture({
      baseColor = "#666666",
      stripeColor = "#777777",
      lineColor = "#ffffff",
      size = 256
    } = {}) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");

      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);

      for (let y = 0; y < size; y += 24) {
        ctx.fillStyle = stripeColor;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(0, y, size, 10);
      }

      ctx.globalAlpha = 1;
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 4;
      ctx.setLineDash([18, 18]);
      ctx.beginPath();
      ctx.moveTo(size / 2, 0);
      ctx.lineTo(size / 2, size);
      ctx.stroke();

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.anisotropy = 4;
      texture.needsUpdate = true;

      return texture;
    }

    // =========================================================
    //  ライト
    // =========================================================

    const hemiLight = new THREE.HemisphereLight(0xffffff, 0x557744, 2.0);
    scene.add(hemiLight);

    const sun = new THREE.DirectionalLight(0xffffff, 2.5);
    sun.position.set(18, 30, 12);
    sun.castShadow = true;
    sun.shadow.mapSize.width = 2048;
    sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left = -45;
    sun.shadow.camera.right = 45;
    sun.shadow.camera.top = 45;
    sun.shadow.camera.bottom = -45;
    scene.add(sun);

    // =========================================================
    //  テクスチャ
    // =========================================================

    const textures = {
      grass: createNoiseTexture({
        baseColor: "#6fc05d",
        noiseColor: "#3f9b42",
        size: 256,
        cellSize: 6,

    function createStaticBox(position, size, color, options = {}) {
      const {
        name = "staticBox",
        // 高台・階段・固定物の上で自キャラが引っかかりすぎないようにする
        friction = 0.12,
        restitution = 0.02
      } = options;

      const useWoodTexture =
        name.includes("brown") ||
        name.includes("Stair") ||
        name === "staticBox";

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(size.x, size.y, size.z),
        new THREE.MeshStandardMaterial({
          map: useWoodTexture ? textures.wood : null,
          color,
          roughness: 0.8
        })
      );

      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const staticBoxMaterial = new CANNON.Material(`${name}_material`);

      const body = new CANNON.Body({
        mass: 0,
        type: CANNON.Body.STATIC,
        material: staticBoxMaterial,
        shape: new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2))
      });

      body.position.set(position.x, position.y, position.z);
      body.allowSleep = false;
      body.userData = {
        name,
        kind: "staticPlatform",
        size: size.clone()
      };

      world.addBody(body);

      world.addContactMaterial(
        new CANNON.ContactMaterial(staticBoxMaterial, bouncyMaterial, {
          friction,
          restitution
        })
      );

      world.addContactMaterial(
        new CANNON.ContactMaterial(staticBoxMaterial, defaultMaterial, {
          friction,
          restitution
        })
      );

      // AABBを明示的に更新して、固定Bodyの判定を安定させる
      body.aabbNeedsUpdate = true;
      body.updateAABB();

      // 固定オブジェクトの上に乗ったときもジャンプできるように、足場候補として保持する
      staticPlatforms.push({
        body,
        position: position.clone(),
        size: size.clone(),
        name
      });

      return { mesh, body };
    }

    function createTitleTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 512;

      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#ffd84a");
      gradient.addColorStop(1, "#c08a18");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(82, 48, 0, 0.55)";
      ctx.lineWidth = 24;
      ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

      ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
      for (let y = 36; y < canvas.height; y += 58) {
        ctx.fillRect(42, y, canvas.width - 84, 8);
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.lineJoin = "round";

      ctx.font = "900 96px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.strokeStyle = "#3b2100";
      ctx.lineWidth = 16;
      ctx.strokeText("めちゃくちゃ", canvas.width / 2, 185);
      ctx.fillStyle = "#ffffff";
      ctx.fillText("めちゃくちゃ", canvas.width / 2, 185);

      ctx.font = "900 104px system-ui, -apple-system, 'Segoe UI', sans-serif";
      ctx.strokeText("ヤギ物理ゲーム", canvas.width / 2, 320);
      ctx.fillStyle = "#fff7b0";
      ctx.fillText("ヤギ物理ゲーム", canvas.width / 2, 320);

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = 4;
      texture.needsUpdate = true;
      return texture;
    }

      const legGeo = new THREE.BoxGeometry(0.22, 0.9, 0.22);

        const pivot = new THREE.Group();

        leg.position.set(0, -0.45, 0);

      parts.frontLeftLegPivot = makeGoatLegPivot(-0.43, -0.55);

    function createNPC(options) {
      const {
        type,

        position,
        color,
        radius = 0.55,
        height = 1.6,
        speed = 2.2,
        wanderRadius = 12
      } = options;

      const isDog = type === "dog";

      const mesh = isDog

      // NPCの物理判定を球ではなく箱にする
      // 球だと地面で転がる/浮く/引っかかるように見えやすいため
      const bodySize = isDog
        ? new THREE.Vector3(0.9, 0.7, 1.1)
        : new THREE.Vector3(0.75, 1.55, 0.75);

      const spawnY = bodySize.y / 2 + 0.04;
      const spawnPosition = new THREE.Vector3(position.x, spawnY, position.z);

      mesh.position.copy(spawnPosition);
      enableShadowForObject3D(mesh);
      scene.add(mesh);

      const body = new CANNON.Body({
        mass: isDog ? 1.4 : 2.4,
        material: defaultMaterial,
        linearDamping: 0.05,
        angularDamping: 0.95,
        fixedRotation: true,
        shape: new CANNON.Box(
          new CANNON.Vec3(bodySize.x / 2, bodySize.y / 2, bodySize.z / 2)
        )
      });

      body.position.set(spawnPosition.x, spawnPosition.y, spawnPosition.z);
      body.allowSleep = false;
      world.addBody(body);
      body.wakeUp();

      const npc = {
        mesh,
        body,
        size: bodySize.clone(),
        hp: 999999,
        maxHp: 999999,
        score: 0,
        name,
        breakable: false,
        visualType: type,
        colorHex: color,
        destroyed: false,
        isNPC: true,
        npcType: type,

        home: new THREE.Vector3(position.x, 0, position.z),
        target: new THREE.Vector3(position.x, 0, position.z),

        speed,
        wanderRadius,
        waitTimer: rand(0.1, 0.6),
        walkAnimTime: rand(0, 10),
        visualYaw: 0,
        stunTimer: 0,
        retargetTimer: rand(2.0, 4.0),

        // アニメーション判定を物理速度だけに依存させない
        isWalking: false,

        // NPCの見た目だけ上下補正する
        visualYOffset: isDog ? -0.16 : -0.18
      };

      body.userData = npc;
      gameObjects.push(npc);
      npcs.push(npc);

      chooseNewNPCTarget(npc);

      return npc;
    }

    function chooseNewNPCTarget(npc) {
      const angle = rand(0, Math.PI * 2);
      const distance = rand(3, npc.wanderRadius);

      const x = clamp(
        npc.home.x + Math.cos(angle) * distance,
        -46,
        46
      );

      const z = clamp(
        npc.home.z + Math.sin(angle) * distance,
        -46,
        46
      );

      npc.target.set(x, 0, z);
      npc.waitTimer = rand(0.2, 1.2);
    }

    function createDynamicBox(options) {
      const {
        position,
        size,
        color,
        mass = 1,
        hp = 50,
        score = 50,
        name = "box",
        breakable = true,
        visualType = "box"
      } = options;

      let mesh;

      if (visualType === "car") {
        mesh = createCarMesh(size, color);
      } else if (visualType === "dangerBox") {
        mesh = createDangerBoxMesh(size, color);
      } else {
          let objectTexture = null;

          if (name === "箱") {
            objectTexture = textures.cardboard;
          } else if (name === "板") {
            objectTexture = textures.board;
          }

          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(size.x, size.y, size.z),
            new THREE.MeshStandardMaterial({
              map: objectTexture,
              color: objectTexture ? 0xffffff : color,
              roughness: 0.72,
              metalness: 0.02
            })
          );

        mesh.castShadow = true;
        mesh.receiveShadow = true;
      }

      mesh.position.copy(position);
      enableShadowForObject3D(mesh);
      scene.add(mesh);

      const body = new CANNON.Body({
        mass,
        material: defaultMaterial,
        linearDamping: 0.08,
        angularDamping: 0.06,
        shape: new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2))
      });

      body.position.set(position.x, position.y, position.z);
      body.allowSleep = true;
      body.sleepSpeedLimit = 0.15;
      body.sleepTimeLimit = 0.6;
      world.addBody(body);

      const obj = {
        mesh,
        body,
        size,
        hp,
        maxHp: hp,
        score,
        name,
        breakable,
        visualType,
        colorHex: color,
        // 車はタイヤが地面に埋まりやすいため、見た目だけ少し上に補正する
        visualYOffset: visualType === "car" ? size.y * 0.28 : 0,
        destroyed: false,
        lastHitTime: 0
      };

      body.userData = obj;
      gameObjects.push(obj);
      if (breakable) {
        destructibles.push(obj);
      }

      body.addEventListener("collide", (event) => {
        handleObjectCollision(obj, event);
      });

      return obj;
    }

    function handleObjectCollision(obj, event) {
      if (!obj.breakable || obj.destroyed) return;

      // ゲーム開始直後は、落下による初期衝突で破壊・スコア加算しない
      if (state.startProtectionTimer > 0) {
        return;
      }

      // ベロでつかんでいる間は、地面や他オブジェクトにぶつかっても壊れない
      // ベロを離した後は通常どおり壊れる
      if (state.lickTarget === obj) {
        return;
      }

      const relativeVelocity = event.contact.getImpactVelocityAlongNormal();
      const impact = Math.abs(relativeVelocity) * obj.body.mass;

      if (impact > 9) {
        obj.hp -= impact * 0.7;

        // 衝突しただけではスコア加算しない。
        // スコアは破壊時の destroyObject 側でのみ加算する。
        if (obj.hp <= 0) {
          destroyObject(obj, impact);
        }
      }
    }

    function destroyObject(obj, impactPower = 16) {
      if (obj.destroyed) return;
      obj.destroyed = true;

      state.destroyedCount += 1;
      state.destroyedByName[obj.name] = (state.destroyedByName[obj.name] || 0) + 1;

      addScore(obj.score + impactPower * 2, obj.mesh.position);

      const basePos = obj.mesh.position.clone();
      const baseColor = new THREE.Color(obj.colorHex ?? 0xffffff);

      scene.remove(obj.mesh);
      world.removeBody(obj.body);

      // 元配列から削除
      const idx = gameObjects.indexOf(obj);
      if (idx >= 0) gameObjects.splice(idx, 1);

      const dIdx = destructibles.indexOf(obj);
      if (dIdx >= 0) destructibles.splice(dIdx, 1);

      // 破片を生成
      const pieceCount = clamp(Math.floor(rand(4, 8)), 4, 8);
      for (let i = 0; i < pieceCount; i++) {
        const s = rand(0.25, 0.55);
        const piece = createDynamicBox({
          position: new THREE.Vector3(
            basePos.x + rand(-0.25, 0.25),
            basePos.y + rand(0, 0.35),
            basePos.z + rand(-0.25, 0.25)
          ),
          size: new THREE.Vector3(s, s, s),
          color: baseColor.getHex(),
          mass: 0.25,
          hp: 9999,
          score: 0,
          name: "debris",
          breakable: false
        });

        piece.body.velocity.set(rand(-3, 3), rand(3, 7), rand(-3, 3));
        piece.body.angularVelocity.set(rand(-8, 8), rand(-8, 8), rand(-8, 8));

        setTimeout(() => {
          if (piece.mesh.parent) scene.remove(piece.mesh);
          if (piece.body.world) world.removeBody(piece.body);

          const pIdx = gameObjects.indexOf(piece);
          if (pIdx >= 0) gameObjects.splice(pIdx, 1);
        }, 8000);
      }

      showMessage(`${obj.name}を破壊！`);
    }

    function createExplosionEffect(position) {
      const group = new THREE.Group();
      group.position.copy(position);
      scene.add(group);

      const colors = [0xffee55, 0xff7a22, 0xff2222, 0xffffff];

      for (let i = 0; i < 34; i++) {
        const radius = rand(0.08, 0.22);
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 10, 10),
          new THREE.MeshBasicMaterial({
            color: colors[i % colors.length],
            transparent: true,
            opacity: 0.95
          })
        );

        const dir = new THREE.Vector3(
          rand(-1, 1),
          rand(0.1, 1.2),
          rand(-1, 1)
        ).normalize();

        mesh.position.set(0, 0, 0);
        mesh.userData.velocity = dir.multiplyScalar(rand(5, 14));
        mesh.userData.life = rand(0.45, 0.9);

        group.add(mesh);
      }

      const light = new THREE.PointLight(0xff7722, 5.0, 18);
      light.position.set(0, 1.2, 0);
      group.add(light);

      explosionEffects.push({
        group,
        light,
        age: 0,
        life: 0.95
      });
    }

    function updateExplosionEffects(delta) {
      for (let i = explosionEffects.length - 1; i >= 0; i--) {
        const effect = explosionEffects[i];
        effect.age += delta;

        for (const child of effect.group.children) {
          if (child.isMesh) {
            child.position.addScaledVector(child.userData.velocity, delta);
            child.userData.velocity.y -= 10 * delta;

            const remain = Math.max(0, 1 - effect.age / effect.life);
            child.material.opacity = remain;
            child.scale.setScalar(1 + effect.age * 1.8);
          }
        }

        if (effect.light) {
          effect.light.intensity = Math.max(0, 5.0 * (1 - effect.age / effect.life));
        }

        if (effect.age >= effect.life) {
          scene.remove(effect.group);
          effect.group.traverse((child) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });
          explosionEffects.splice(i, 1);
        }
      }
    }

    function explodeAt(position, power = 10, radius = 8) {
      showMessage("ドカーン！");
      createExplosionEffect(position);
      screenShake(0.35, 0.45);

      // 爆発しただけではスコア加算しない。
      // スコアは赤箱を破壊した destroyObject 側で加算する。

      for (const obj of [...gameObjects]) {
        const objPos = cannonToThreeVec3(obj.body.position);
        const distance = objPos.distanceTo(position);

        if (distance < radius && obj.body.mass > 0) {
          const dir = objPos.clone().sub(position).normalize();
          const strength = (1 - distance / radius) * power;
          obj.body.applyImpulse(
            new CANNON.Vec3(dir.x * strength, strength * 0.9, dir.z * strength),
            obj.body.position
          );

          if (obj.breakable && strength > 4) {
            obj.hp -= strength * 8;
            if (obj.hp <= 0) {
              destroyObject(obj, strength);
            }
          }
        }
      }

      const playerPos = cannonToThreeVec3(player.body.position);
      const playerDistance = playerPos.distanceTo(position);

      if (playerDistance < radius) {
        const dir = playerPos.clone().sub(position).normalize();
        const strength = (1 - playerDistance / radius) * power * 1.8;
        player.body.applyImpulse(
          new CANNON.Vec3(dir.x * strength, strength * 0.8, dir.z * strength),
          player.body.position
        );
      }
    }

    // 爆発箱は destroy 時に爆発させるため、destroyObjectを少し拡張
    const originalDestroyObject = destroyObject;
    destroyObject = function patchedDestroyObject(obj, impactPower = 16) {
      const wasExplosive = obj.explosive === true;
      const pos = obj.mesh.position.clone();
      originalDestroyObject(obj, impactPower);

      if (wasExplosive) {
        setTimeout(() => {
          explodeAt(pos, 13, 9);
        }, 40);
      }
    };

    function updateJoystick(event) {
      const rect = joystickArea.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = event.clientX - cx;
      const dy = event.clientY - cy;
      const max = rect.width * 0.36;

      const length = Math.hypot(dx, dy);
      const limited = Math.min(length, max);
      const angle = Math.atan2(dy, dx);

      const kx = Math.cos(angle) * limited;
      const ky = Math.sin(angle) * limited;

      joystick.x = kx / max;
      joystick.y = ky / max;

      joystickKnob.style.transform = `translate(${kx}px, ${ky}px)`;
    }

    function endJoystick(event) {
      if (event.pointerId !== joystick.pointerId) return;
      joystick.active = false;
      joystick.pointerId = null;
      joystick.x = 0;
      joystick.y = 0;
      joystickKnob.style.transform = "translate(0px, 0px)";
    }

    function setupCameraDrag() {
      let dragging = false;
      let pointerId = null;
      let lastX = 0;
      let lastY = 0;

      canvas.addEventListener("pointerdown", (event) => {
        if (event.target !== canvas) return;

        dragging = true;
        pointerId = event.pointerId;
        lastX = event.clientX;
        lastY = event.clientY;
        canvas.setPointerCapture(pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!dragging || event.pointerId !== pointerId) return;

        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;

        lastX = event.clientX;
        lastY = event.clientY;

        state.cameraYaw -= dx * 0.006;
        // 上下方向を今までより大きく見回せるようにする
        state.cameraPitch = clamp(state.cameraPitch + dy * 0.006, -1.35, 1.35);
      });

      canvas.addEventListener("pointerup", () => {
        dragging = false;
        pointerId = null;
      });

      canvas.addEventListener("pointercancel", () => {
        dragging = false;
        pointerId = null;
      });
    }

    function getCameraDirections() {
      const forward = new THREE.Vector3(
        Math.sin(state.cameraYaw),
        0,
        Math.cos(state.cameraYaw)
      ).normalize();

      const right = new THREE.Vector3(
        Math.cos(state.cameraYaw),
        0,
        -Math.sin(state.cameraYaw)
      ).normalize();

      return { forward, right };
    }

    function animateGoatLegs(delta, isMoving) {
      const parts = player.mesh.userData.parts || {};

      if (!player.mesh.userData.walkAnimTime) {
        player.mesh.userData.walkAnimTime = 0;
      }

      if (isMoving && state.isGrounded && state.dashTime <= 0) {
        player.mesh.userData.walkAnimTime += delta * 10;
      } else if (isMoving && state.dashTime > 0) {
        player.mesh.userData.walkAnimTime += delta * 16;
      }

      const t = player.mesh.userData.walkAnimTime;
      const swing = isMoving && state.isGrounded
        ? Math.sin(t) * (state.dashTime > 0 ? 0.55 : 0.42)
        : 0;

      const opposite = -swing;

      if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x = swing;
      if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x = swing;

      if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x = opposite;
      if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x = opposite;

      if (!isMoving || !state.isGrounded) {
        const resetSpeed = 0.18;

        if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x *= 1 - resetSpeed;
      }

      if (parts.head && isMoving && state.isGrounded) {
        parts.head.position.y = 0.32 + Math.abs(Math.sin(t)) * 0.025;
      } else if (parts.head) {
        parts.head.position.y += (0.32 - parts.head.position.y) * 0.15;
      }

      if (parts.tail && isMoving && state.isGrounded) {
        parts.tail.rotation.y = Math.sin(t * 0.7) * 0.12;
      } else if (parts.tail) {
        parts.tail.rotation.y *= 0.85;
      }
    }

    function updatePlayer(delta) {
      state.headbuttCooldown = Math.max(0, state.headbuttCooldown - delta);
      state.jumpCooldown = Math.max(0, state.jumpCooldown - delta);
      state.dashCooldown = Math.max(0, state.dashCooldown - delta);
      state.dashTime = Math.max(0, state.dashTime - delta);

      checkGrounded();

      // 接地中にオブジェクト接触などで上方向へ跳ねすぎるのを抑える
      // ジャンプ直後は jumpCooldown が残るので、この補正をかけない
      if (state.isGrounded && state.jumpCooldown <= 0 && state.dashTime <= 0) {
        if (player.body.velocity.y > 1.2) {
          player.body.velocity.y *= 0.35;
        }
      }

      let inputX = 0;
      let inputY = 0;

      if (keys.forward) inputY -= 1;
      if (keys.back) inputY += 1;
      if (keys.left) inputX -= 1;
      if (keys.right) inputX += 1;

      if (Math.abs(joystick.x) > 0.05 || Math.abs(joystick.y) > 0.05) {
        // スマホスティック用
        inputX -= joystick.x;
        inputY += joystick.y;
      }

      inputX = clamp(inputX, -1, 1);
      inputY = clamp(inputY, -1, 1);

      const { forward, right } = getCameraDirections();

      const move = new THREE.Vector3();
      move.addScaledVector(right, inputX);
      move.addScaledVector(forward, -inputY);

      let isPlayerMoving = false;

      if (move.lengthSq() > 0.001) {
        player.body.wakeUp();

        move.normalize();

        const speed = state.dashTime > 0 ? 15.2 : 10.8;
        const targetVX = move.x * speed;
        const targetVZ = move.z * speed;

        // 接地中は摩擦に負けないように、横方向速度を強めに反映する
        // 空中では少し補間して、ジャンプ中の操作感を自然にする
        if (state.isGrounded) {
          const groundAccel = state.dashTime > 0 ? 0.82 : 0.68;

          player.body.velocity.x += (targetVX - player.body.velocity.x) * groundAccel;
          player.body.velocity.z += (targetVZ - player.body.velocity.z) * groundAccel;

          // 接地中に速度が極端に落ちた場合の最低移動補助
          const horizontalSpeed = Math.hypot(player.body.velocity.x, player.body.velocity.z);
          const minGroundSpeed = state.dashTime > 0 ? 7.5 : 5.8;

          if (horizontalSpeed < minGroundSpeed) {
            player.body.velocity.x = move.x * minGroundSpeed;
            player.body.velocity.z = move.z * minGroundSpeed;
          }

          // 地面接触時の細かい跳ねを抑える
          if (state.jumpCooldown <= 0 && player.body.velocity.y > 0.45) {
            player.body.velocity.y *= 0.2;
          }
        } else {
          // 空中は少し弱めに操作を効かせる
          const airAccel = 0.22;

          player.body.velocity.x += (targetVX - player.body.velocity.x) * airAccel;
          player.body.velocity.z += (targetVZ - player.body.velocity.z) * airAccel;
        }

        player.visualYaw = Math.atan2(move.x, move.z);
        isPlayerMoving = true;
      } else {
        // 入力がないときは自然に減速
        const stopDamping = state.isGrounded ? 0.78 : 0.96;
        player.body.velocity.x *= stopDamping;
        player.body.velocity.z *= stopDamping;
      }

      animateGoatLegs(delta, isPlayerMoving);

      syncMeshWithBody(player.mesh, player.body);

      // 足が地面に埋まりすぎないよう、見た目だけ少し上にずらす
      player.mesh.position.y += player.visualYOffset || 0;

      // 自キャラモデル設定
      // モデル自体はローカルの -Z 方向を向いて作っているため、
      // 進行方向に顔が向くように180度補正する
      player.mesh.rotation.set(0, player.visualYaw + Math.PI, 0);

      // ダッシュ中の少し派手な上下揺れ
      if (state.dashTime > 0) {
        player.mesh.scale.set(1.18, 1.08, 1.22);
      } else {
        player.mesh.scale.lerp(new THREE.Vector3(1.1, 1.1, 1.1), 0.15);
      }

      updateLick(delta);
    }

    function checkGrounded() {
      const playerX = player.body.position.x;
      const playerY = player.body.position.y;
      const playerZ = player.body.position.z;

      const from = new CANNON.Vec3(playerX, playerY, playerZ);
      const to = new CANNON.Vec3(playerX, playerY - 1.75, playerZ);

      const ray = new CANNON.Ray(from, to);
      const result = new CANNON.RaycastResult();

      ray.intersectWorld(world, {
        mode: CANNON.Ray.CLOSEST,
        result,
        skipBackfaces: false
      });

      const rayHitGround =
        result.hasHit &&
        result.body !== player.body;

      // 通常地面の補助判定
      const nearBaseGround =
        playerY <= 1.15 &&
        Math.abs(player.body.velocity.y) < 2.0;

      // 固定オブジェクトの上面に乗っている場合の補助判定
      let onStaticPlatform = false;

      for (const platform of staticPlatforms) {
        const topY = platform.position.y + platform.size.y / 2;
        const expectedPlayerCenterY = topY + 0.72;

        const withinX =
          Math.abs(playerX - platform.position.x) <= platform.size.x / 2 + 0.75;

        const withinZ =
          Math.abs(playerZ - platform.position.z) <= platform.size.z / 2 + 0.75;

        const nearTop =
          Math.abs(playerY - expectedPlayerCenterY) <= 0.45;

        const notFlyingUpFast =
          player.body.velocity.y <= 1.8;

        if (withinX && withinZ && nearTop && notFlyingUpFast) {
          onStaticPlatform = true;
          break;
        }
      }

      state.isGrounded = rayHitGround || nearBaseGround || onStaticPlatform;
    }

    function jump() {
      if (!state.started) return;
      if (state.jumpCooldown > 0) return;

      // ボタンを押した瞬間にも接地判定を再確認する
      // スマホ操作ではタイミングによって state.isGrounded が false のままになることがあるため
      checkGrounded();

      if (!state.isGrounded) return;

      player.body.wakeUp();

      // 現在の落下/上昇速度に左右されにくいように、Y速度を直接設定する
      player.body.velocity.y = 8.4;

      state.jumpCooldown = 0.28;
      // addScore(2, player.mesh.position); ←※ジャンプでスコア2加算されていたので削除
      showMessage("ジャンプ！");
    }

    function startDash() {
      if (!state.started) return;
      if (state.dashCooldown > 0) return;

      state.dashTime = 0.8;
      state.dashCooldown = 2.0;

      const dir = new THREE.Vector3(Math.sin(player.visualYaw), 0, Math.cos(player.visualYaw));
      player.body.applyImpulse(
        new CANNON.Vec3(dir.x * 8, 1.0, dir.z * 8),
        player.body.position
      );

      showMessage("ダッシュ！");
    }

    function headbutt() {
      if (!state.started) return;
      if (state.headbuttCooldown > 0) return;

      state.headbuttCooldown = 0.55;

      const playerPos = cannonToThreeVec3(player.body.position);
      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      // 伝説の剣をベロで保持している間だけ、頭突きの吹き飛ばし力を大幅強化
      const hasLegendarySwordPower = !!(state.lickTarget && state.lickTarget.isLegendarySword);
      const legendaryPowerMultiplier = hasLegendarySwordPower ? 5 : 1;

      let hitSomething = false;

      for (const obj of [...gameObjects]) {
        if (!obj.body || obj.destroyed || obj.body.mass <= 0) continue;

        // ベロで掴んでいるオブジェクトは、頭突きでは壊さない・吹き飛ばさない
        if (state.lickTarget === obj) continue;

        const objPos = cannonToThreeVec3(obj.body.position);
        const toObj = objPos.clone().sub(playerPos);
        const distance = toObj.length();

        if (distance > 4.2) continue;

        const dir = toObj.clone().normalize();
        const angleScore = forward.dot(dir);

        if (angleScore > 0.25) {
          hitSomething = true;

          const impulsePower = 10 + Math.max(0, 4.2 - distance) * 3.5;
          obj.body.wakeUp();

        if (obj.isNPC) {
          // NPCは破壊不能。ただし、頭突きでは派手に吹き飛ばす。
          const npcImpulsePower = impulsePower * (obj.npcType === "dog" ? 3.4 : 3.0) * legendaryPowerMultiplier;
          const upwardPower = (obj.npcType === "dog" ? 11.5 : 12.5) * (hasLegendarySwordPower ? 1.35 : 1);

          obj.stunTimer = 2.0;
          obj.isWalking = false;

          obj.body.wakeUp();
          obj.body.velocity.set(0, 0, 0);
          obj.body.angularVelocity.set(0, 0, 0);

          obj.body.applyImpulse(
            new CANNON.Vec3(
              forward.x * npcImpulsePower,
              upwardPower,
              forward.z * npcImpulsePower
            ),
            obj.body.position
          );

          // 頭突きしただけではスコア加算しない
          continue;
        }

          const effectiveImpulsePower = impulsePower * legendaryPowerMultiplier;

          obj.body.applyImpulse(
            new CANNON.Vec3(
              forward.x * effectiveImpulsePower,
              (4.5 + impulsePower * 0.18) * (hasLegendarySwordPower ? 1.35 : 1),
              forward.z * effectiveImpulsePower
            ),
            obj.body.position
          );

          if (obj.breakable) {
            obj.hp -= impulsePower * 3.0;
            if (obj.hp <= 0) {
              destroyObject(obj, impulsePower);
            }
            // 頭突きで当てただけではスコア加算しない
          }
        }
      }

      player.body.applyImpulse(
        new CANNON.Vec3(forward.x * 1.5, 0.4, forward.z * 1.5),
        player.body.position
      );

      if (hitSomething) {
        if (hasLegendarySwordPower) {
          showMessage("伝説の剣パワー！");
          screenShake(0.35, 0.5);
        } else {
          showMessage("頭突きヒット！");
          screenShake(0.18, 0.18);
        }
      } else {
        showMessage("スカッ");
      }
    }

    function resetPlayer() {
      if (state.lickTarget) {
        releaseLick();
      }

      player.body.position.set(
        PLAYER_START_POSITION.x,
        PLAYER_START_POSITION.y,
        PLAYER_START_POSITION.z
      );
      player.body.velocity.set(0, -0.1, 0);
      player.body.angularVelocity.set(0, 0, 0);
      player.body.quaternion.set(0, 0, 0, 1);

      // RESET後に空中で止まったように見える問題を防ぐ
      player.body.force.set(0, 0, 0);
      player.body.torque.set(0, 0, 0);
      player.body.sleepState = CANNON.Body.AWAKE;
      player.body.wakeUp();

      state.isGrounded = false;
      state.dashTime = 0;
      state.jumpCooldown = 0;

      syncMeshWithBody(player.mesh, player.body);

      showMessage("リセット！");
    }


    function pullLegendarySwordFromStone(target) {
      if (!target || !target.isLegendarySword || !target.body) return;

      // 初回にベロで掴んだ瞬間だけ、地面から引き抜かれるように上へ押し出す
      if (!target.isPulledFromStone) {
        target.isPulledFromStone = true;

        if (target.mesh && target.mesh.userData && target.mesh.userData.pedestal) {
          target.mesh.userData.pedestal.visible = false;
        }

        target.body.mass = 0.65;
        target.body.fixedRotation = false;
        target.body.updateMassProperties();
        target.body.position.y += 1.4;
        target.body.velocity.set(0, 7.5, 0);
        target.body.angularVelocity.set(rand(-1.5, 1.5), rand(-1.5, 1.5), rand(-1.5, 1.5));
        target.body.wakeUp();

        showMessage("伝説の剣を引き抜いた！");
      }
    }

    function toggleLick() {
      if (!state.started) return;

      if (state.lickTarget) {
        releaseLick();
        updateHeadbuttButtonLabel();
        showMessage("ベロ解除！");
        return;
      }

      const target = findLickTarget();

      if (!target) {
        showMessage("届かない！");
        return;
      }

      state.lickTarget = target;

      // ベロ保持中は暴れすぎないように一時的に減衰を強める
      target._beforeLickLinearDamping = target.body.linearDamping;
      target._beforeLickAngularDamping = target.body.angularDamping;

      target.body.linearDamping = 0.55;
      target.body.angularDamping = 0.75;
      target.body.wakeUp();

      createLickLine();
      updateHeadbuttButtonLabel();

      if (target.isLegendarySword) {
        pullLegendarySwordFromStone(target);

        if (!state.hasLegendarySword) {
          state.hasLegendarySword = true;
          updateMission();
          showMessage("伝説の剣を装備中は頭突きの威力アップ！");
        } else {
          showMessage("伝説の剣をベロで掴んだ！");
        }
        return;
      }

      // ベロでつかむだけではスコア加算しない
      showMessage(`${target.name}をつかんだ！`);
    }

    function findLickTarget() {
      const playerPos = cannonToThreeVec3(player.body.position);
      const mouthPos = playerPos.clone().add(new THREE.Vector3(0, 0.45, 0));

      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      let best = null;
      let bestScore = -999;

      for (const obj of gameObjects) {
        if (!obj.body || obj.destroyed || obj.body.mass <= 0) continue;
        if (obj.name === "debris") continue;

        const objPos = cannonToThreeVec3(obj.body.position);
        const toObj = objPos.clone().sub(mouthPos);
        const distance = toObj.length();

        if (distance > 5.5) continue;

        const dir = toObj.clone().normalize();
        const dot = forward.dot(dir);

        if (dot < 0.22) continue;

        const score = dot * 2 - distance * 0.2;

        if (score > bestScore) {
          bestScore = score;
          best = obj;
        }
      }

      return best;
    }

    function createLickLine() {
      // THREE.Line の linewidth は多くのブラウザで太く表示されないため、
      // 円柱メッシュで太いベロを表現する
      const geo = new THREE.CylinderGeometry(0.055, 0.055, 1, 12);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff5aa5,
        emissive: 0x772244,
        emissiveIntensity: 0.25,
        roughness: 0.45
      });

      state.lickLine = new THREE.Mesh(geo, mat);
      state.lickLine.castShadow = false;
      state.lickLine.receiveShadow = false;
      scene.add(state.lickLine);
    }

    function updateLickCylinder(start, end) {
      if (!state.lickLine) return;

      const direction = end.clone().sub(start);
      const length = direction.length();

      if (length <= 0.001) {
        state.lickLine.visible = false;
        return;
      }

      state.lickLine.visible = true;

      const mid = start.clone().add(end).multiplyScalar(0.5);
      state.lickLine.position.copy(mid);

      // CylinderGeometry は初期状態でY軸方向に伸びるので、
      // Y軸を start→end 方向へ向ける
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        direction.normalize()
      );

      state.lickLine.quaternion.copy(quat);
      state.lickLine.scale.set(1, length, 1);
    }

    function releaseLick() {
      if (state.lickTarget && state.lickTarget.body) {
        const obj = state.lickTarget;

        // ベロ保持前の減衰値に戻す
        if (typeof obj._beforeLickLinearDamping === "number") {
          obj.body.linearDamping = obj._beforeLickLinearDamping;
        }

        if (typeof obj._beforeLickAngularDamping === "number") {
          obj.body.angularDamping = obj._beforeLickAngularDamping;
        }

        delete obj._beforeLickLinearDamping;
        delete obj._beforeLickAngularDamping;

        obj.body.wakeUp();
      }

      if (state.lickLine) {
        scene.remove(state.lickLine);
        state.lickLine.geometry.dispose();
        state.lickLine.material.dispose();
        state.lickLine = null;
      }

      state.lickTarget = null;
      updateHeadbuttButtonLabel();
    }

    function updateLick(delta) {
      if (!state.lickTarget || state.lickTarget.destroyed) {
        releaseLick();
        return;
      }

      const obj = state.lickTarget;

      const playerPos = cannonToThreeVec3(player.body.position);
      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      const mouthPos = playerPos.clone()
        .add(new THREE.Vector3(0, 0.65, 0))
        .add(forward.clone().multiplyScalar(0.95));

      const holdPos = mouthPos.clone()
        .add(forward.clone().multiplyScalar(2.6))
        .add(new THREE.Vector3(0, 0.45, 0));

      const objPos = cannonToThreeVec3(obj.body.position);
      const toHold = holdPos.clone().sub(objPos);
      const distance = toHold.length();

      // 以前は10m程度で外していたが、少し振り回せるように距離を緩和
      if (distance > 18) {
        releaseLick();
        showMessage("ベロが外れた！");
        return;
      }

      obj.body.wakeUp();

      // 強すぎるバネ力で地面衝突時に吹っ飛んでいたため、
      // 「やや柔らかいバネ + 速度減衰 + 速度上限」に変更する
      const velocity = cannonToThreeVec3(obj.body.velocity);

      const springStrength = 7.5 * obj.body.mass;
      const dampingStrength = 2.8 * obj.body.mass;

      const springForce = toHold.multiplyScalar(springStrength);
      const dampingForce = velocity.multiplyScalar(-dampingStrength);
      const totalForce = springForce.add(dampingForce);

      // 地面に擦ったときに極端に暴れないよう、少しだけ持ち上げ補助
      if (obj.body.position.y < 0.9) {
        totalForce.y += obj.body.mass * 18;
      }

      obj.body.applyForce(
        new CANNON.Vec3(totalForce.x, totalForce.y, totalForce.z),
        obj.body.position
      );

      // 回転しすぎると暴れやすいので、ベロ保持中だけ回転速度を抑える
      obj.body.angularVelocity.x *= 0.88;
      obj.body.angularVelocity.y *= 0.88;
      obj.body.angularVelocity.z *= 0.88;

      // 移動速度に上限をかけて、地面接触時の異常な吹っ飛びを抑える
      const maxSpeed = obj.isLegendarySword ? 16.0 : 9.0;
      const currentSpeed = obj.body.velocity.length();

      if (currentSpeed > maxSpeed) {
        const scale = maxSpeed / currentSpeed;
        obj.body.velocity.x *= scale;
        obj.body.velocity.y *= scale;
        obj.body.velocity.z *= scale;
      }

      if (state.lickLine) {
        updateLickCylinder(mouthPos, objPos);
      }
      // ベロで移動させるだけではスコア加算しない
    }

    const shake = {
      time: 0,
      strength: 0
    };

    function screenShake(time, strength) {
      shake.time = Math.max(shake.time, time);
      shake.strength = Math.max(shake.strength, strength);
    }

    function updateCamera(delta) {
      const target = cannonToThreeVec3(player.body.position).add(new THREE.Vector3(0, 1.2, 0));

      const baseDistance = state.dashTime > 0 ? 8.5 : 7.2;
      // cameraPitch の範囲をさらに広げたため、高さと距離も大きく変化させる
      // 下げると低い見上げ視点、上げると高い見下ろし視点になる
      const horizontalDistance = clamp(baseDistance * Math.cos(state.cameraPitch * 0.65), 3.6, baseDistance);
      const height = clamp(4.2 + Math.sin(state.cameraPitch) * 8.5, -1.6, 15.2);

      const offset = new THREE.Vector3(
        -Math.sin(state.cameraYaw) * horizontalDistance,
        height,
        -Math.cos(state.cameraYaw) * horizontalDistance
      );

      const desired = target.clone().add(offset);

      if (shake.time > 0) {
        shake.time -= delta;
        desired.x += rand(-shake.strength, shake.strength);
        desired.y += rand(-shake.strength, shake.strength);
        desired.z += rand(-shake.strength, shake.strength);
      }

      camera.position.lerp(desired, 1 - Math.pow(0.001, delta));
      camera.lookAt(target);
    }

    function updateMission() {
      let newlyCompleted = [];

      for (const mission of missions) {
        if (!mission.completed && mission.check()) {
          mission.completed = true;
          newlyCompleted.push(mission);
        }
      }

      if (newlyCompleted.length > 0) {
        const totalReward = newlyCompleted.reduce((sum, mission) => sum + mission.reward, 0);

        if (totalReward > 0) {
          addScore(totalReward, player.mesh.position, { skipMissionUpdate: true });
        }

        if (newlyCompleted.length === 1) {
          showMissionClearToast(newlyCompleted[0].title, newlyCompleted[0].reward, 1);
          showMessage(`MISSION CLEAR：${newlyCompleted[0].title} +${newlyCompleted[0].reward}`);
        } else {
          showMissionClearToast("複数ミッション達成", totalReward, newlyCompleted.length);
          showMessage(`MISSION CLEAR x${newlyCompleted.length} +${totalReward}`);
        }
      }

      const nextMission = missions.find((mission) => !mission.completed);

      if (nextMission) {
        missionTextEl.textContent = `${nextMission.title}：${nextMission.progressText()}`;
      } else {
        missionTextEl.textContent = "全ミッション達成！好きなだけ暴れよう！";
      }

      renderMissionList();
    }

    function renderMissionList() {
      if (!missionListEl) return;

      missionListEl.innerHTML = "";

      for (const mission of missions) {
        const item = document.createElement("div");
        item.className = `missionItem${mission.completed ? " completed" : ""}`;

        const mark = document.createElement("div");
        mark.className = "missionMark";
        mark.textContent = mission.completed ? "✅" : "⬜";

        const body = document.createElement("div");

        const name = document.createElement("div");
        name.className = "missionName";
        name.textContent = mission.title;

        const desc = document.createElement("div");
        desc.className = "missionDesc";
        desc.textContent = mission.desc;

        const progress = document.createElement("div");
        progress.className = "missionProgress";
        progress.textContent = `進捗：${mission.progressText()} / 報酬：+${mission.reward}`;

        body.appendChild(name);
        body.appendChild(desc);
        body.appendChild(progress);

        item.appendChild(mark);
        item.appendChild(body);

        missionListEl.appendChild(item);
      }
    }

    function resetNPC(npc) {
      const respawnPosition = getRandomNPCHighPosition();

      // 落下後は新しいランダム位置をホームにして、高い場所から再出現させる
      npc.home.set(respawnPosition.x, 0, respawnPosition.z);
      npc.body.position.set(respawnPosition.x, respawnPosition.y, respawnPosition.z);
      npc.body.velocity.set(0, 0, 0);
      npc.body.angularVelocity.set(0, 0, 0);
      npc.body.force.set(0, 0, 0);
      npc.body.torque.set(0, 0, 0);
      npc.body.quaternion.set(0, 0, 0, 1);
      npc.body.wakeUp();

      npc.stunTimer = 0;
      npc.isWalking = false;
      npc.retargetTimer = rand(2.0, 4.0);
      chooseNewNPCTarget(npc);
    }

    // =========================================================
    //  同期・掃除
    // =========================================================

    function updateNPCs(delta) {
      for (const npc of npcs) {
        if (!npc.body || npc.destroyed) continue;

        npc.body.wakeUp();

        // ベロで掴まれている間は自力移動しない
        if (state.lickTarget === npc) {
          npc.isWalking = false;
          npc.walkAnimTime += delta * 5;
          npc.stunTimer = Math.max(npc.stunTimer, 0.25);
          continue;
        }

        // 頭突きなどで吹き飛ばされた直後は、自律移動で速度を上書きしない
        if (npc.stunTimer > 0) {
          npc.isWalking = false;
          npc.stunTimer = Math.max(0, npc.stunTimer - delta);
          npc.walkAnimTime += delta * 8;
          continue;
        }

        // 落下しすぎた場合は初期位置へ戻す
        if (npc.body.position.y < FALL_RESET_Y) {
          resetNPC(npc);
          npc.retargetTimer = rand(2.0, 4.0);
          continue;
        }

        npc.retargetTimer -= delta;

        const pos = cannonToThreeVec3(npc.body.position);

        const toTarget = new THREE.Vector3(
          npc.target.x - pos.x,
          0,
          npc.target.z - pos.z
        );

        const distance = toTarget.length();

        if (distance < 1.0 || npc.retargetTimer <= 0) {
          npc.waitTimer -= delta;
          npc.isWalking = false;

          npc.body.velocity.x *= 0.6;
          npc.body.velocity.z *= 0.6;

          if (npc.waitTimer <= 0 || npc.retargetTimer <= 0) {
            chooseNewNPCTarget(npc);
            npc.retargetTimer = rand(2.5, 5.0);
          }

          continue;
        }

        const dir = toTarget.normalize();

        // 速度を少し上げ、地面摩擦に負けないようにする
        const npcSpeed = npc.npcType === "dog"
          ? npc.speed * 1.25
          : npc.speed * 1.15;

        npc.body.velocity.x = dir.x * npcSpeed;
        npc.body.velocity.z = dir.z * npcSpeed;

        // 上下方向は物理に任せる。浮き上がりだけ軽く抑える
        if (npc.body.velocity.y > 0.5) {
          npc.body.velocity.y *= 0.45;
        }

        npc.body.velocity.y = Math.max(npc.body.velocity.y, -7);

        npc.visualYaw = Math.atan2(dir.x, dir.z);
        npc.walkAnimTime += delta * (npc.npcType === "dog" ? 12 : 9);
        npc.isWalking = true;
      }
    }

    function animateNPCMeshes(delta) {
      for (const npc of npcs) {
        if (!npc.mesh || !npc.body) continue;

        syncMeshWithBody(npc.mesh, npc.body);

        // 見た目だけの足元補正
        npc.mesh.position.y += npc.visualYOffset || 0;

        // 進行方向へ向ける
        npc.mesh.rotation.set(0, npc.visualYaw + Math.PI, 0);

        const walking =
          npc.isWalking &&
          state.lickTarget !== npc &&
          npc.stunTimer <= 0;

        const parts = npc.mesh.userData.parts || {};

        if (walking) {
          const t = npc.walkAnimTime;

          // 全体の軽い上下揺れ
          const bounce = Math.abs(Math.sin(t)) * 0.045;
          npc.mesh.position.y += bounce;

          // 少し左右に揺れて歩いている感じを出す
          npc.mesh.rotation.z = Math.sin(t * 0.5) * 0.045;

          if (npc.npcType === "human") {
            // 人型：腕と足を前後に振る
            const swing = Math.sin(t) * 0.75;

            if (parts.leftArmPivot) parts.leftArmPivot.rotation.x = swing;
            if (parts.rightArmPivot) parts.rightArmPivot.rotation.x = -swing;

            if (parts.leftLegPivot) parts.leftLegPivot.rotation.x = -swing * 0.75;
            if (parts.rightLegPivot) parts.rightLegPivot.rotation.x = swing * 0.75;

            if (parts.head) {
              parts.head.position.y = 1.28 + Math.abs(Math.sin(t)) * 0.025;
            }

            npc.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.2);
          }

          if (npc.npcType === "dog") {
            // 犬型：前足と後ろ足を交互に振る
            const swing = Math.sin(t) * 0.65;
            const opposite = -swing;

            if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x = swing;
            if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x = swing;

            if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x = opposite;
            if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x = opposite;

            if (parts.tail) {
              parts.tail.rotation.y = Math.sin(t * 1.6) * 0.45;
              parts.tail.rotation.x = -0.55 + Math.cos(t * 1.6) * 0.12;
            }

            if (parts.head) {
              parts.head.position.y = 0.55 + Math.abs(Math.sin(t)) * 0.025;
            }

            npc.mesh.scale.set(
              1.0 + Math.sin(t) * 0.025,
              1.0,
              1.0 + Math.cos(t) * 0.025
            );
          }
        } else {
          // 停止時はパーツを自然に戻す
          npc.mesh.rotation.z *= 0.85;

          if (parts.leftArmPivot) parts.leftArmPivot.rotation.x *= 0.8;
          if (parts.rightArmPivot) parts.rightArmPivot.rotation.x *= 0.8;
          if (parts.leftLegPivot) parts.leftLegPivot.rotation.x *= 0.8;
          if (parts.rightLegPivot) parts.rightLegPivot.rotation.x *= 0.8;

          if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x *= 0.8;
          if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x *= 0.8;
          if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x *= 0.8;
          if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x *= 0.8;

          if (parts.tail) {
            parts.tail.rotation.y *= 0.8;
            parts.tail.rotation.x += (-0.55 - parts.tail.rotation.x) * 0.2;
          }

          npc.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
        }
      }
    }

    function syncObjects() {
      for (const obj of gameObjects) {
        if (!obj.mesh || !obj.body) continue;

        // NPCは専用アニメーション側で同期する
        if (obj.isNPC) continue;

        syncMeshWithBody(obj.mesh, obj.body);

        if (obj.visualYOffset) {
          obj.mesh.position.y += obj.visualYOffset;
        }

        if (obj.isLegendarySword && obj.mesh.userData) {
          obj.mesh.userData.animTime = (obj.mesh.userData.animTime || 0) + 0.035;
          const t = obj.mesh.userData.animTime;
          if (obj.mesh.userData.aura) {
            obj.mesh.userData.aura.scale.setScalar(1 + Math.sin(t * 2.2) * 0.08);
          }
          if (obj.mesh.userData.light) {
            obj.mesh.userData.light.intensity = 2.6 + Math.sin(t * 3.0) * 0.55;
          }
        }

        // 遠くへ落ちすぎた物は戻す
        if (obj.body.position.y < -20) {
          obj.body.position.set(rand(-20, 20), rand(4, 10), rand(-20, 20));
          obj.body.velocity.set(0, 0, 0);
          obj.body.angularVelocity.set(0, 0, 0);
        }
      }
    }

    function cleanupTooManyDebris() {
      const debris = gameObjects.filter((obj) => obj.name === "debris");

      if (debris.length <= 35) return;

      const removeCount = debris.length - 35;

      for (let i = 0; i < removeCount; i++) {
        const obj = debris[i];
        if (obj.mesh.parent) scene.remove(obj.mesh);
        if (obj.body.world) world.removeBody(obj.body);

        const idx = gameObjects.indexOf(obj);
        if (idx >= 0) gameObjects.splice(idx, 1);
      }
    }

    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // =========================================================
    //  メインループ
    // =========================================================

    let fixedTimeStep = 1 / 60;
    let maxSubSteps = 5;

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (state.started) {
        if (state.startProtectionTimer > 0) {
          state.startProtectionTimer = Math.max(0, state.startProtectionTimer - delta);

          if (state.startProtectionTimer === 0) {
            showMessage("暴れてOK！");
          }
        }

        updatePlayer(delta);
        updateNPCs(delta);
        updateCombo(delta);
        updateMessage(delta);
        updateCamera(delta);
        updateExplosionEffects(delta);
        cleanupTooManyDebris();

        world.step(fixedTimeStep, delta, maxSubSteps);

        syncObjects();
        animateNPCMeshes(delta);

        // プレイヤーが落ちたら復帰
        if (player.body.position.y < FALL_RESET_Y) {
          resetPlayer();
          showMessage("落下！初期位置に戻りました");
        }
      } else {
        updateCamera(delta);
      }

      renderer.render(scene, camera);
    }

    init();
  </script>
</body>
</html>
