<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スマホ用ミニゲーム</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      text-align: center;
      background: #f5f5f5;
      user-select: none;
    }

    h1 {
      margin-top: 40px;
    }

    #score {
      font-size: 48px;
      margin: 30px;
    }

    button {
      font-size: 28px;
      padding: 24px 40px;
      border-radius: 16px;
      border: none;
      background: #4caf50;
      color: white;
    }

    button:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>
  <h1>タップゲーム</h1>
  <div id="score">0</div>
  <button id="tapButton">タップ！</button>

  <script>
    let score = 0;

    const scoreText = document.getElementById("score");
    const tapButton = document.getElementById("tapButton");

    tapButton.addEventListener("pointerdown", function () {
      score++;
      scoreText.textContent = score;
    });
  </script>
</body>
</html>
