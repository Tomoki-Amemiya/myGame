    function createExplosionEffect(position) {
      const group = new THREE.Group();
      group.position.copy(position);
      scene.add(group);

      const colors = [0xffee55, 0xff7a22, 0xff2222, 0xffffff];

      for (let i = 0; i < 34; i++) {
        const radius = rand(0.08, 0.22);
        const mesh = new THREE.Mesh(
          new THREE.SphereGeometry(radius, 10, 10),
          new THREE.MeshBasicMaterial({
            color: colors[i % colors.length],
            transparent: true,
            opacity: 0.95
          })
        );

        const dir = new THREE.Vector3(
          rand(-1, 1),
          rand(0.1, 1.2),
          rand(-1, 1)
        ).normalize();

        mesh.position.set(0, 0, 0);
        mesh.userData.velocity = dir.multiplyScalar(rand(5, 14));
        mesh.userData.life = rand(0.45, 0.9);

        group.add(mesh);
      }

      const light = new THREE.PointLight(0xff7722, 5.0, 18);
      light.position.set(0, 1.2, 0);
      group.add(light);

      explosionEffects.push({
        group,
        light,
        age: 0,
        life: 0.95
      });
    }

    function updateExplosionEffects(delta) {
      for (let i = explosionEffects.length - 1; i >= 0; i--) {
        const effect = explosionEffects[i];
        effect.age += delta;

        for (const child of effect.group.children) {
          if (child.isMesh) {
            child.position.addScaledVector(child.userData.velocity, delta);
            child.userData.velocity.y -= 10 * delta;

            const remain = Math.max(0, 1 - effect.age / effect.life);
            child.material.opacity = remain;
            child.scale.setScalar(1 + effect.age * 1.8);
          }
        }

        if (effect.light) {
          effect.light.intensity = Math.max(0, 5.0 * (1 - effect.age / effect.life));
        }

        if (effect.age >= effect.life) {
          scene.remove(effect.group);
          effect.group.traverse((child) => {
            if (child.geometry) child.geometry.dispose();
            if (child.material) child.material.dispose();
          });
          explosionEffects.splice(i, 1);
        }
      }
    }

    function explodeAt(position, power = 10, radius = 8) {
      showMessage("ドカーン！");
      createExplosionEffect(position);
      screenShake(0.35, 0.45);

      // 爆発しただけではスコア加算しない。
      // スコアは赤箱を破壊した destroyObject 側で加算する。

      for (const obj of [...gameObjects]) {
        const objPos = cannonToThreeVec3(obj.body.position);
        const distance = objPos.distanceTo(position);

        if (distance < radius && obj.body.mass > 0) {
          const dir = objPos.clone().sub(position).normalize();
          const strength = (1 - distance / radius) * power;
          obj.body.applyImpulse(
            new CANNON.Vec3(dir.x * strength, strength * 0.9, dir.z * strength),
            obj.body.position
          );

          if (obj.breakable && strength > 4) {
            obj.hp -= strength * 8;
            if (obj.hp <= 0) {
              destroyObject(obj, strength);
            }
          }
        }
      }

      const playerPos = cannonToThreeVec3(player.body.position);
      const playerDistance = playerPos.distanceTo(position);

      if (playerDistance < radius) {
        const dir = playerPos.clone().sub(position).normalize();
        const strength = (1 - playerDistance / radius) * power * 1.8;
        player.body.applyImpulse(
          new CANNON.Vec3(dir.x * strength, strength * 0.8, dir.z * strength),
          player.body.position
        );
      }
    }

      const pos = obj.mesh.position.clone();
      originalDestroyObject(obj, impactPower);

      if (wasExplosive) {

    function updateJoystick(event) {
      const rect = joystickArea.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = event.clientX - cx;
      const dy = event.clientY - cy;
      const max = rect.width * 0.36;

      const length = Math.hypot(dx, dy);
      const limited = Math.min(length, max);
      const angle = Math.atan2(dy, dx);

      const kx = Math.cos(angle) * limited;
      const ky = Math.sin(angle) * limited;

      joystick.x = kx / max;
      joystick.y = ky / max;

      joystickKnob.style.transform = `translate(${kx}px, ${ky}px)`;
    }

    function endJoystick(event) {
      if (event.pointerId !== joystick.pointerId) return;
      joystick.active = false;
      joystick.pointerId = null;
      joystick.x = 0;
      joystick.y = 0;
      joystickKnob.style.transform = "translate(0px, 0px)";
    }

    // 画面ドラッグでカメラを回転する処理です。
    // 感度や上下回転の制限を変えたい場合はこの関数を調整します。
    function setupCameraDrag() {
      let dragging = false;
      let pointerId = null;
      let lastX = 0;
      let lastY = 0;

      canvas.addEventListener("pointerdown", (event) => {
        if (event.target !== canvas) return;

        dragging = true;
        pointerId = event.pointerId;
        lastX = event.clientX;
        lastY = event.clientY;
        canvas.setPointerCapture(pointerId);
      });

      canvas.addEventListener("pointermove", (event) => {
        if (!dragging || event.pointerId !== pointerId) return;

        const dx = event.clientX - lastX;
        const dy = event.clientY - lastY;

        lastX = event.clientX;
        lastY = event.clientY;

        state.cameraYaw -= dx * 0.006;
        // 上下方向を今までより大きく見回せるようにする
        state.cameraPitch = clamp(state.cameraPitch + dy * 0.006, -1.35, 1.35);
      });

      canvas.addEventListener("pointerup", () => {
        dragging = false;
        pointerId = null;
      });

      canvas.addEventListener("pointercancel", () => {
        dragging = false;
        pointerId = null;
      });
    }

    // =========================================================
    //  プレイヤー操作処理

    function getCameraDirections() {
      const forward = new THREE.Vector3(
        Math.sin(state.cameraYaw),
        0,
        Math.cos(state.cameraYaw)
      ).normalize();

      const right = new THREE.Vector3(
        Math.cos(state.cameraYaw),
        0,
        -Math.sin(state.cameraYaw)
      ).normalize();

      return { forward, right };
    }

    function animateGoatLegs(delta, isMoving) {
      const parts = player.mesh.userData.parts || {};

      if (!player.mesh.userData.walkAnimTime) {
        player.mesh.userData.walkAnimTime = 0;
      }

      if (isMoving && state.isGrounded && state.dashTime <= 0) {
        player.mesh.userData.walkAnimTime += delta * 10;
      } else if (isMoving && state.dashTime > 0) {
        player.mesh.userData.walkAnimTime += delta * 16;
      }

      const t = player.mesh.userData.walkAnimTime;
      const swing = isMoving && state.isGrounded
        ? Math.sin(t) * (state.dashTime > 0 ? 0.55 : 0.42)
        : 0;

      const opposite = -swing;

      if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x = swing;
      if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x = swing;

      if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x = opposite;
      if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x = opposite;

      if (!isMoving || !state.isGrounded) {
        const resetSpeed = 0.18;

        if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x *= 1 - resetSpeed;
        if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x *= 1 - resetSpeed;
      }

      if (parts.head && isMoving && state.isGrounded) {
        parts.head.position.y = 0.32 + Math.abs(Math.sin(t)) * 0.025;
      } else if (parts.head) {
        parts.head.position.y += (0.32 - parts.head.position.y) * 0.15;
      }

      if (parts.tail && isMoving && state.isGrounded) {
        parts.tail.rotation.y = Math.sin(t * 0.7) * 0.12;
      } else if (parts.tail) {
        parts.tail.rotation.y *= 0.85;
      }
    }

    // プレイヤーの移動処理です。
    // 通常移動速度、ダッシュ速度、摩擦対策、足アニメーションなどを調整します。
    function updatePlayer(delta) {
      state.headbuttCooldown = Math.max(0, state.headbuttCooldown - delta);
      state.jumpCooldown = Math.max(0, state.jumpCooldown - delta);
      state.dashCooldown = Math.max(0, state.dashCooldown - delta);
      state.dashTime = Math.max(0, state.dashTime - delta);

      checkGrounded();

      // 接地中にオブジェクト接触などで上方向へ跳ねすぎるのを抑える
      // ジャンプ直後は jumpCooldown が残るので、この補正をかけない
      if (state.isGrounded && state.jumpCooldown <= 0 && state.dashTime <= 0) {
        if (player.body.velocity.y > 1.2) {
          player.body.velocity.y *= 0.35;
        }
      }

      let inputX = 0;
      let inputY = 0;

      if (keys.forward) inputY -= 1;
      if (keys.back) inputY += 1;
      if (keys.left) inputX += 1;
      if (keys.right) inputX -= 1;

      if (Math.abs(joystick.x) > 0.05 || Math.abs(joystick.y) > 0.05) {
        // スマホスティック用
        inputX -= joystick.x;
        inputY += joystick.y;
      }

      inputX = clamp(inputX, -1, 1);
      inputY = clamp(inputY, -1, 1);

      const { forward, right } = getCameraDirections();

      const move = new THREE.Vector3();
      move.addScaledVector(right, inputX);
      move.addScaledVector(forward, -inputY);

      let isPlayerMoving = false;

      if (move.lengthSq() > 0.001) {
        player.body.wakeUp();

        move.normalize();

        // 移動速度です。左がダッシュ中、右が通常時です。
      const speed = state.dashTime > 0 ? 15.2 : 10.8;
        const targetVX = move.x * speed;
        const targetVZ = move.z * speed;

        // 接地中は摩擦に負けないように、横方向速度を強めに反映する
        // 空中では少し補間して、ジャンプ中の操作感を自然にする
        if (state.isGrounded) {
          // 接地中の加速の強さです。大きいほど入力にキビキビ反応します。
      const groundAccel = state.dashTime > 0 ? 0.82 : 0.68;

          player.body.velocity.x += (targetVX - player.body.velocity.x) * groundAccel;
          player.body.velocity.z += (targetVZ - player.body.velocity.z) * groundAccel;

          // 接地中に速度が極端に落ちた場合の最低移動補助
          const horizontalSpeed = Math.hypot(player.body.velocity.x, player.body.velocity.z);
          // 地面で摩擦に負けないための最低速度です。
      const minGroundSpeed = state.dashTime > 0 ? 7.5 : 5.8;

          if (horizontalSpeed < minGroundSpeed) {
            player.body.velocity.x = move.x * minGroundSpeed;
            player.body.velocity.z = move.z * minGroundSpeed;
          }

          // 地面接触時の細かい跳ねを抑える
          if (state.jumpCooldown <= 0 && player.body.velocity.y > 0.45) {
            player.body.velocity.y *= 0.2;
          }
        } else {
          // 空中は少し弱めに操作を効かせる
          const airAccel = 0.22;

          player.body.velocity.x += (targetVX - player.body.velocity.x) * airAccel;
          player.body.velocity.z += (targetVZ - player.body.velocity.z) * airAccel;
        }

        player.visualYaw = Math.atan2(move.x, move.z);
        isPlayerMoving = true;
      } else {
        // 入力がないときは自然に減速
        const stopDamping = state.isGrounded ? 0.78 : 0.96;
        player.body.velocity.x *= stopDamping;
        player.body.velocity.z *= stopDamping;
      }

      animateGoatLegs(delta, isPlayerMoving);

      syncMeshWithBody(player.mesh, player.body);

      // 足が地面に埋まりすぎないよう、見た目だけ少し上にずらす
      player.mesh.position.y += player.visualYOffset || 0;

      // 自キャラモデル設定
      // モデル自体はローカルの -Z 方向を向いて作っているため、
      // 進行方向に顔が向くように180度補正する
      player.mesh.rotation.set(0, player.visualYaw + Math.PI, 0);

      // ダッシュ中の少し派手な上下揺れ
      if (state.dashTime > 0) {
        player.mesh.scale.set(1.18, 1.08, 1.22);
      } else {
        player.mesh.scale.lerp(new THREE.Vector3(1.1, 1.1, 1.1), 0.15);
      }

      updateLick(delta);
    }

    function checkGrounded() {
      const playerX = player.body.position.x;
      const playerY = player.body.position.y;
      const playerZ = player.body.position.z;

      const from = new CANNON.Vec3(playerX, playerY, playerZ);
      const to = new CANNON.Vec3(playerX, playerY - 1.75, playerZ);

      const ray = new CANNON.Ray(from, to);
      const result = new CANNON.RaycastResult();

      ray.intersectWorld(world, {
        mode: CANNON.Ray.CLOSEST,
        result,
        skipBackfaces: false
      });

      const rayHitGround =
        result.hasHit &&
        result.body !== player.body;

      // 通常地面の補助判定
      const nearBaseGround =
        playerY <= 1.15 &&
        Math.abs(player.body.velocity.y) < 2.0;

      // 固定オブジェクトの上面に乗っている場合の補助判定
      let onStaticPlatform = false;

      for (const platform of staticPlatforms) {
        const topY = platform.position.y + platform.size.y / 2;
        const expectedPlayerCenterY = topY + 0.72;

        const withinX =
          Math.abs(playerX - platform.position.x) <= platform.size.x / 2 + 0.75;

        const withinZ =
          Math.abs(playerZ - platform.position.z) <= platform.size.z / 2 + 0.75;

        const nearTop =
          Math.abs(playerY - expectedPlayerCenterY) <= 0.45;

        const notFlyingUpFast =
          player.body.velocity.y <= 1.8;

        if (withinX && withinZ && nearTop && notFlyingUpFast) {
          onStaticPlatform = true;
          break;
        }
      }

      state.isGrounded = rayHitGround || nearBaseGround || onStaticPlatform;
    }

    function jump() {
      if (!state.started) return;
      if (state.jumpCooldown > 0) return;

      // ボタンを押した瞬間にも接地判定を再確認する
      // スマホ操作ではタイミングによって state.isGrounded が false のままになることがあるため
      checkGrounded();

      if (!state.isGrounded) return;

      player.body.wakeUp();

      // 現在の落下/上昇速度に左右されにくいように、Y速度を直接設定する
      player.body.velocity.y = 8.4;

      state.jumpCooldown = 0.28;
      // addScore(2, player.mesh.position); ←※ジャンプでスコア2加算されていたので削除
      showMessage("ジャンプ！");
    }

    function startDash() {
      if (!state.started) return;
      if (state.dashCooldown > 0) return;

      state.dashTime = 0.8;
      state.dashCooldown = 2.0;

      const dir = new THREE.Vector3(Math.sin(player.visualYaw), 0, Math.cos(player.visualYaw));
      player.body.applyImpulse(
        new CANNON.Vec3(dir.x * 8, 1.0, dir.z * 8),
        player.body.position
      );

      showMessage("ダッシュ！");
    }

    // 頭突き処理です。
    // 範囲、威力、クールタイム、伝説の剣装備時の倍率などを調整します。
    function headbutt() {
      if (!state.started) return;
      if (state.headbuttCooldown > 0) return;

      state.headbuttCooldown = 0.55;

      const playerPos = cannonToThreeVec3(player.body.position);
      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      // 伝説の剣をベロで保持している間だけ、頭突きの吹き飛ばし力を大幅強化
      const hasLegendarySwordPower = !!(state.lickTarget && state.lickTarget.isLegendarySword);
      const legendaryPowerMultiplier = hasLegendarySwordPower ? 5 : 1;
      let legendaryMissionChanged = false;

      if (hasLegendarySwordPower) {
        state.legendaryPowerHeadbuttCount += 1;
        legendaryMissionChanged = true;
      }

      let hitSomething = false;

      for (const obj of [...gameObjects]) {
        if (!obj.body || obj.destroyed || (obj.body.mass <= 0 && !obj.breakable)) continue;

        // ベロで掴んでいるオブジェクトは、頭突きでは壊さない・吹き飛ばさない
        if (state.lickTarget === obj) continue;

        const objPos = cannonToThreeVec3(obj.body.position);
        const toObj = objPos.clone().sub(playerPos);
        const distance = toObj.length();

        if (distance > 4.2) continue;

        const dir = toObj.clone().normalize();
        const angleScore = forward.dot(dir);

        if (angleScore > 0.25) {
          hitSomething = true;

          // 基本吹き飛ばし力です。近いほど強くなります。
      const impulsePower = 10 + Math.max(0, 4.2 - distance) * 3.5;
          obj.body.wakeUp();

        if (obj.isNPC) {
          // NPCは破壊不能。ただし、頭突きでは派手に吹き飛ばす。
          const npcImpulsePower = impulsePower * (obj.npcType === "dog" ? 3.4 : 3.0) * legendaryPowerMultiplier;
          const upwardPower = (obj.npcType === "dog" ? 11.5 : 12.5) * (hasLegendarySwordPower ? 1.35 : 1);

          obj.stunTimer = 2.0;
          obj.isWalking = false;

          if (hasLegendarySwordPower) {
            incrementCounterMap(state.legendaryPowerHeadbuttByName, obj.name || (obj.npcType === "dog" ? "犬" : "人"));
            legendaryMissionChanged = true;
          }

          obj.body.wakeUp();
          obj.body.velocity.set(0, 0, 0);
          obj.body.angularVelocity.set(0, 0, 0);

          obj.body.applyImpulse(
            new CANNON.Vec3(
              forward.x * npcImpulsePower,
              upwardPower,
              forward.z * npcImpulsePower
            ),
            obj.body.position
          );

          // 頭突きしただけではスコア加算しない
          continue;
        }

          const effectiveImpulsePower = impulsePower * legendaryPowerMultiplier;
          const isCar = obj.visualType === "car";
          const forwardImpulsePower = isCar
            ? effectiveImpulsePower * CAR_HEADBUTT_FORWARD_MULTIPLIER
            : effectiveImpulsePower;
          const upwardImpulsePower = isCar
            ? CAR_HEADBUTT_UPWARD_IMPULSE * (hasLegendarySwordPower ? 1.4 : 1)
            : (4.5 + impulsePower * 0.18) * (hasLegendarySwordPower ? 1.35 : 1);

          // 車は頭突き時に真上へ跳ねやすかったため、上方向の速度を抑えてから
          // 前方向の吹き飛ばしを強めに入れる。
          if (isCar) {
            obj.body.velocity.y = Math.min(obj.body.velocity.y, 1.2);
          }

          obj.body.applyImpulse(
            new CANNON.Vec3(
              forward.x * forwardImpulsePower,
              upwardImpulsePower,
              forward.z * forwardImpulsePower
            ),
            obj.body.position
          );

          if (obj.breakable) {
            if (!obj.spawnProtectedUntilGrounded) {
              if (obj.visualType === "houseIntact") {
                collapseHouse(obj, impulsePower);
                continue;
              }

              const headbuttDamage = isCar
                ? (hasLegendarySwordPower ? CAR_HEADBUTT_DAMAGE_LEGENDARY : CAR_HEADBUTT_DAMAGE)
                : impulsePower * 3.0;

              obj.hp -= headbuttDamage;
              if (obj.visualType === "titleSignBoard") {
                registerTitleSignHeadbutt(obj);
              }
              if (obj.hp <= 0) {
                destroyObject(obj, impulsePower);
              }
            }
            // 頭突きで当てただけではスコア加算しない
          }
        }
      }

      player.body.applyImpulse(
        new CANNON.Vec3(forward.x * 1.5, 0.4, forward.z * 1.5),
        player.body.position
      );

      if (hitSomething) {
        if (hasLegendarySwordPower) {
          showMessage("伝説の剣パワー！");
          screenShake(0.35, 0.5);
        } else {
          showMessage("頭突きヒット！");
          screenShake(0.18, 0.18);
        }
      } else {
        showMessage("スカッ");
      }

      if (legendaryMissionChanged) {
        updateMission();
      }
    }

        releaseLick();
      }

      player.body.position.set(
        PLAYER_START_POSITION.x,
        PLAYER_START_POSITION.y,
        PLAYER_START_POSITION.z

      player.body.velocity.set(0, -0.1, 0);
      player.body.angularVelocity.set(0, 0, 0);
      player.body.quaternion.set(0, 0, 0, 1);

      // RESET後に空中で止まったように見える問題を防ぐ
      player.body.force.set(0, 0, 0);
      player.body.torque.set(0, 0, 0);
      player.body.sleepState = CANNON.Body.AWAKE;
      player.body.wakeUp();

      state.isGrounded = false;
      state.dashTime = 0;
      state.jumpCooldown = 0;

      syncMeshWithBody(player.mesh, player.body);

      showMessage("リセット！");
    }


    function pullLegendarySwordFromStone(target) {
      if (!target || !target.isLegendarySword || !target.body) return;

      // 初回にベロで掴んだ瞬間だけ、地面から引き抜かれるように上へ押し出す
      if (!target.isPulledFromStone) {
        target.isPulledFromStone = true;

        if (target.mesh && target.mesh.userData && target.mesh.userData.pedestal) {
          target.mesh.userData.pedestal.visible = false;
        }

        target.body.mass = 0.65;
        target.body.fixedRotation = false;
        target.body.updateMassProperties();
        target.body.position.y += 1.4;
        target.body.velocity.set(0, 7.5, 0);
        target.body.angularVelocity.set(rand(-1.5, 1.5), rand(-1.5, 1.5), rand(-1.5, 1.5));
        target.body.wakeUp();

        showMessage("伝説の剣を引き抜いた！");
      }
    }

    function toggleLick() {
      if (!state.started) return;

      if (state.lickTarget) {
        releaseLick();
        updateHeadbuttButtonLabel();
        showMessage("ベロ解除！");
        return;
      }

      const target = findLickTarget();

      if (!target) {
        showMessage("届かない！");
        return;
      }

      state.lickTarget = target;

      // ベロ保持中は暴れすぎないように一時的に減衰を強める
      target._beforeLickLinearDamping = target.body.linearDamping;
      target._beforeLickAngularDamping = target.body.angularDamping;

      if (!target.isCannon) {
        target.body.linearDamping = 0.55;
        target.body.angularDamping = 0.75;
        target.body.wakeUp();
      }

      createLickLine();
      updateHeadbuttButtonLabel();

      if (target.isCannon) {
        showMessage("大砲の向きを変更中！");
        return;
      }

      if (target.isLegendarySword) {
        pullLegendarySwordFromStone(target);

        if (!state.hasLegendarySword) {
          state.hasLegendarySword = true;
          updateMission();
          showMessage("伝説の剣を装備中は頭突きの威力アップ！");
        } else {
          showMessage("伝説の剣をベロで掴んだ！");
        }
        return;
      }

      // ベロでつかむだけではスコア加算しない
      showMessage(`${target.name}をつかんだ！`);
    }

    function findLickTarget() {
      const playerPos = cannonToThreeVec3(player.body.position);
      const mouthPos = playerPos.clone().add(new THREE.Vector3(0, 0.45, 0));

      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      let best = null;
      let bestScore = -999;

      for (const obj of gameObjects) {
        if (!obj.body || obj.destroyed) continue;
        if (obj.body.mass <= 0 && !obj.isCannon) continue;
        if (obj.name === "debris") continue;

        const objPos = cannonToThreeVec3(obj.body.position);
        const toObj = objPos.clone().sub(mouthPos);
        const distance = toObj.length();

        if (distance > 5.5) continue;

        const dir = toObj.clone().normalize();
        const dot = forward.dot(dir);

        if (dot < 0.22) continue;

        const score = dot * 2 - distance * 0.2;

        if (score > bestScore) {
          bestScore = score;
          best = obj;
        }
      }

      return best;
    }

    function createLickLine() {
      // THREE.Line の linewidth は多くのブラウザで太く表示されないため、
      // 円柱メッシュで太いベロを表現する
      const geo = new THREE.CylinderGeometry(0.055, 0.055, 1, 12);
      const mat = new THREE.MeshStandardMaterial({
        color: 0xff5aa5,
        emissive: 0x772244,
        emissiveIntensity: 0.25,
        roughness: 0.45
      });

      state.lickLine = new THREE.Mesh(geo, mat);
      state.lickLine.castShadow = false;
      state.lickLine.receiveShadow = false;
      scene.add(state.lickLine);
    }

    function updateLickCylinder(start, end) {
      if (!state.lickLine) return;

      const direction = end.clone().sub(start);
      const length = direction.length();

      if (length <= 0.001) {
        state.lickLine.visible = false;
        return;
      }

      state.lickLine.visible = true;

      const mid = start.clone().add(end).multiplyScalar(0.5);
      state.lickLine.position.copy(mid);

      // CylinderGeometry は初期状態でY軸方向に伸びるので、
      // Y軸を start→end 方向へ向ける
      const quat = new THREE.Quaternion();
      quat.setFromUnitVectors(
        new THREE.Vector3(0, 1, 0),
        direction.normalize()
      );

      state.lickLine.quaternion.copy(quat);
      state.lickLine.scale.set(1, length, 1);
    }

    function releaseLick() {
      if (state.lickTarget && state.lickTarget.body) {
        const obj = state.lickTarget;

        // ベロ保持前の減衰値に戻す
        if (typeof obj._beforeLickLinearDamping === "number") {
          obj.body.linearDamping = obj._beforeLickLinearDamping;
        }

        if (typeof obj._beforeLickAngularDamping === "number") {
          obj.body.angularDamping = obj._beforeLickAngularDamping;
        }

        delete obj._beforeLickLinearDamping;
        delete obj._beforeLickAngularDamping;

        obj.body.wakeUp();
      }

      if (state.lickLine) {
        scene.remove(state.lickLine);
        state.lickLine.geometry.dispose();
        state.lickLine.material.dispose();
        state.lickLine = null;
      }

      state.lickTarget = null;
      updateHeadbuttButtonLabel();
    }

    function updateLick(delta) {
      if (!state.lickTarget || state.lickTarget.destroyed) {
        releaseLick();
        return;
      }

      const obj = state.lickTarget;

      const playerPos = cannonToThreeVec3(player.body.position);
      const forward = new THREE.Vector3(
        Math.sin(player.visualYaw),
        0,
        Math.cos(player.visualYaw)
      ).normalize();

      const mouthPos = playerPos.clone()
        .add(new THREE.Vector3(0, 0.65, 0))
        .add(forward.clone().multiplyScalar(0.95));

      if (obj.isCannon) {
        const cannonPos = getCannonMouthPosition(obj);
        const distance = mouthPos.distanceTo(cannonPos);

        if (distance > 14) {
          releaseLick();
          showMessage("ベロが外れた！");
          return;
        }

        const toPlayer = playerPos.clone().sub(obj.position);
        toPlayer.y = 0;
        if (toPlayer.lengthSq() > 0.001) {
          const desiredYaw = Math.atan2(toPlayer.x, toPlayer.z);
          obj.yaw = lerpAngle(obj.yaw || 0, desiredYaw, 0.22);
        }

        syncCannonVisual(obj);
        updateLickCylinder(mouthPos, cannonPos);
        return;
      }

      const holdPos = mouthPos.clone()
        .add(forward.clone().multiplyScalar(2.6))
        .add(new THREE.Vector3(0, 0.45, 0));

      const objPos = cannonToThreeVec3(obj.body.position);
      const toHold = holdPos.clone().sub(objPos);
      const distance = toHold.length();

      // 以前は10m程度で外していたが、少し振り回せるように距離を緩和
      if (distance > 18) {
        releaseLick();
        showMessage("ベロが外れた！");
        return;
      }

      obj.body.wakeUp();

      // 強すぎるバネ力で地面衝突時に吹っ飛んでいたため、
      // 「やや柔らかいバネ + 速度減衰 + 速度上限」に変更する
      const velocity = cannonToThreeVec3(obj.body.velocity);

      const springStrength = 7.5 * obj.body.mass;
      const dampingStrength = 2.8 * obj.body.mass;

      const springForce = toHold.multiplyScalar(springStrength);
      const dampingForce = velocity.multiplyScalar(-dampingStrength);
      const totalForce = springForce.add(dampingForce);

      // 地面に擦ったときに極端に暴れないよう、少しだけ持ち上げ補助
      if (obj.body.position.y < 0.9) {
        totalForce.y += obj.body.mass * 18;
      }

      obj.body.applyForce(
        new CANNON.Vec3(totalForce.x, totalForce.y, totalForce.z),
        obj.body.position
      );

      // 回転しすぎると暴れやすいので、ベロ保持中だけ回転速度を抑える
      obj.body.angularVelocity.x *= 0.88;
      obj.body.angularVelocity.y *= 0.88;
      obj.body.angularVelocity.z *= 0.88;

      // 移動速度に上限をかけて、地面接触時の異常な吹っ飛びを抑える
      const maxSpeed = obj.isLegendarySword ? 16.0 : 9.0;
      const currentSpeed = obj.body.velocity.length();

      if (currentSpeed > maxSpeed) {
        const scale = maxSpeed / currentSpeed;
        obj.body.velocity.x *= scale;
        obj.body.velocity.y *= scale;
        obj.body.velocity.z *= scale;
      }

      if (state.lickLine) {
        updateLickCylinder(mouthPos, objPos);
      }
      // ベロで移動させるだけではスコア加算しない
    }

    const shake = {

      strength: 0

    function screenShake(time, strength) {
      shake.time = Math.max(shake.time, time);
      shake.strength = Math.max(shake.strength, strength);

    // カメラ追従処理です。
    // 距離、高さ、上下角度、追従のなめらかさを調整します。
    function updateCamera(delta) {
      const target = cannonToThreeVec3(player.body.position).add(new THREE.Vector3(0, 1.2, 0));

      const baseDistance = state.dashTime > 0 ? 8.5 : 7.2;
      // cameraPitch の範囲をさらに広げたため、高さと距離も大きく変化させる
      // 下げると低い見上げ視点、上げると高い見下ろし視点になる
      const horizontalDistance = clamp(baseDistance * Math.cos(state.cameraPitch * 0.65), 3.6, baseDistance);
      const height = clamp(4.2 + Math.sin(state.cameraPitch) * 8.5, -1.6, 15.2);

      const offset = new THREE.Vector3(
        -Math.sin(state.cameraYaw) * horizontalDistance,
        height,
        -Math.cos(state.cameraYaw) * horizontalDistance
      );

      const desired = target.clone().add(offset);

      if (shake.time > 0) {
        shake.time -= delta;
        desired.x += rand(-shake.strength, shake.strength);
        desired.y += rand(-shake.strength, shake.strength);
        desired.z += rand(-shake.strength, shake.strength);
      }

      camera.position.lerp(desired, 1 - Math.pow(0.001, delta));
      camera.lookAt(target);
    }

    function updateMission() {
      let newlyCompleted = [];

      for (const mission of missions) {
        if (!mission.completed && mission.check()) {
          mission.completed = true;
          newlyCompleted.push(mission);
        }
      }

      if (newlyCompleted.length > 0) {
        const totalReward = newlyCompleted.reduce((sum, mission) => sum + mission.reward, 0);
        const secretCompleted = newlyCompleted.filter((mission) => mission.hidden);
        const normalCompleted = newlyCompleted.filter((mission) => !mission.hidden);

        if (totalReward > 0) {
          addScore(totalReward, player.mesh.position, { skipMissionUpdate: true });
        }

        // 隠しミッションが含まれる場合は、隠しミッションの通知を先にキューへ入れる。
        // 通常ミッションも同時達成している場合は、その後に通常ミッション通知を続けて表示する。
        if (secretCompleted.length > 0) {
          const secretReward = secretCompleted.reduce((sum, mission) => sum + mission.reward, 0);
          const secretTitle = secretCompleted.length === 1 ? secretCompleted[0].title : "複数の隠しミッション";
          showSecretMissionClearToast(secretTitle, secretReward, secretCompleted.length);
          showMessage(`㊙ SECRET MISSION CLEAR：${secretTitle} +${secretReward}`);
          screenShake(0.55, 0.75);
        }

        if (normalCompleted.length > 0) {
          const normalReward = normalCompleted.reduce((sum, mission) => sum + mission.reward, 0);

          if (normalCompleted.length === 1) {
            showMissionClearToast(normalCompleted[0].title, normalCompleted[0].reward, 1);

            if (secretCompleted.length === 0) {
              showMessage(`MISSION CLEAR：${normalCompleted[0].title} +${normalCompleted[0].reward}`);
            }
          } else {
            showMissionClearToast("複数ミッション達成", normalReward, normalCompleted.length);

            if (secretCompleted.length === 0) {
              showMessage(`MISSION CLEAR x${normalCompleted.length} +${normalReward}`);
            }
          }
        }
      }

      const nextMission = missions.find((mission) => !mission.completed && !mission.hidden);

      if (nextMission) {
        missionTextEl.textContent = `${nextMission.title}：${nextMission.progressText()}`;
      } else {
        missionTextEl.textContent = "全ミッション達成！好きなだけ暴れよう！";
      }

      renderMissionList();
    }

    function renderMissionList() {
      if (!missionListEl) return;

      missionListEl.innerHTML = "";

      for (const mission of missions) {
        if (mission.hidden && !mission.completed) continue;

        const item = document.createElement("div");
        item.className = `missionItem${mission.completed ? " completed" : ""}${mission.hidden ? " secretMission" : ""}`;

        const mark = document.createElement("div");
        mark.className = "missionMark";
        mark.textContent = mission.hidden ? "㊙" : (mission.completed ? "✅" : "⬜");

        const body = document.createElement("div");

        const name = document.createElement("div");
        name.className = "missionName";
        name.textContent = mission.hidden ? `㊙ 隠しミッション：${mission.title}` : mission.title;

        const desc = document.createElement("div");
        desc.className = "missionDesc";
        desc.textContent = mission.desc;

        const progress = document.createElement("div");
        progress.className = "missionProgress";
        progress.textContent = `進捗：${mission.progressText()} / 報酬：+${mission.reward}`;

        body.appendChild(name);
        body.appendChild(desc);
        body.appendChild(progress);

        item.appendChild(mark);
        item.appendChild(body);

        missionListEl.appendChild(item);
      }
    }

    }

    function resetNPC(npc) {
      const respawnPosition = getRandomNPCHighPosition();

      // 落下後は新しいランダム位置をホームにして、高い場所から再出現させる
      npc.home.set(respawnPosition.x, 0, respawnPosition.z);
      npc.body.position.set(respawnPosition.x, respawnPosition.y, respawnPosition.z);
      npc.body.velocity.set(0, 0, 0);
      npc.body.angularVelocity.set(0, 0, 0);
      npc.body.force.set(0, 0, 0);
      npc.body.torque.set(0, 0, 0);
      npc.body.quaternion.set(0, 0, 0, 1);
      npc.body.wakeUp();

      npc.stunTimer = 0;
      npc.isWalking = false;
      npc.cannonAirborneLock = false;
      npc.cannonFlightTimer = 0;
      npc.retargetTimer = rand(2.0, 4.0);
      chooseNewNPCTarget(npc);
    }

    // =========================================================
    //  同期・掃除
    // =========================================================

    function updateNPCs(delta) {
      for (const npc of npcs) {
        if (!npc.body || npc.destroyed) continue;

        npc.body.wakeUp();

        // ベロで掴まれている間は自力移動しない
        if (state.lickTarget === npc) {
          npc.isWalking = false;
          npc.walkAnimTime += delta * 5;
          npc.stunTimer = Math.max(npc.stunTimer, 0.25);
          continue;
        }

        // 落下しすぎた場合は初期位置へ戻す
        if (npc.body.position.y < FALL_RESET_Y) {
          resetNPC(npc);
          npc.retargetTimer = rand(2.0, 4.0);
          continue;
        }

        const groundInfo = getNPCGroundInfo(npc);

        // 大砲で飛ばされたNPCは、着地するまで自律移動を再開させない。
        // これにより、犬型NPCが空中で歩行を始めてマップ内へ戻ってくる挙動を防ぐ。
        if (npc.cannonAirborneLock) {
          npc.isWalking = false;
          npc.walkAnimTime += delta * 5;
          npc.cannonFlightTimer = Math.max(0, (npc.cannonFlightTimer || 0) - delta);

          if (!groundInfo.grounded || Math.abs(npc.body.velocity.y) > 1.25) {
            continue;
          }

          npc.cannonAirborneLock = false;
          npc.cannonFlightTimer = 0;
          npc.stunTimer = Math.max(npc.stunTimer || 0, 0.35);
          npc.isWalking = false;

          // 犬型NPCは背が低いため、着地直後に少し浮いた表示になりやすい。
          // 地面/足場の上面に近い場合だけ物理位置を軽く補正する。
          if (npc.npcType === "dog" && groundInfo.snapY !== null) {
            npc.body.position.y = groundInfo.snapY;
            if (npc.body.velocity.y > 0) npc.body.velocity.y = 0;
          }

          chooseNewNPCTarget(npc);
          continue;
        }

        // 頭突きなどで吹き飛ばされた直後は、自律移動で速度を上書きしない
        if (npc.stunTimer > 0) {
          npc.isWalking = false;
          npc.stunTimer = Math.max(0, npc.stunTimer - delta);
          npc.walkAnimTime += delta * 8;
          continue;
        }

        npc.retargetTimer -= delta;

        const pos = cannonToThreeVec3(npc.body.position);

        const toTarget = new THREE.Vector3(
          npc.target.x - pos.x,
          0,
          npc.target.z - pos.z
        );

        const distance = toTarget.length();

        if (distance < 1.0 || npc.retargetTimer <= 0) {
          npc.waitTimer -= delta;
          npc.isWalking = false;

          npc.body.velocity.x *= 0.6;
          npc.body.velocity.z *= 0.6;

          if (npc.waitTimer <= 0 || npc.retargetTimer <= 0) {
            chooseNewNPCTarget(npc);
            npc.retargetTimer = rand(2.5, 5.0);
          }

          continue;
        }

        const dir = toTarget.normalize();

        // 速度を少し上げ、地面摩擦に負けないようにする
        const npcSpeed = npc.npcType === "dog"
          ? npc.speed * 1.25
          : npc.speed * 1.15;

        npc.body.velocity.x = dir.x * npcSpeed;
        npc.body.velocity.z = dir.z * npcSpeed;

        // 上下方向は物理に任せる。浮き上がりだけ軽く抑える
        if (npc.body.velocity.y > 0.5) {
          npc.body.velocity.y *= 0.45;
        }

        npc.body.velocity.y = Math.max(npc.body.velocity.y, -7);

        npc.visualYaw = Math.atan2(dir.x, dir.z);
        npc.walkAnimTime += delta * (npc.npcType === "dog" ? 12 : 9);
        npc.isWalking = true;
      }
    }

    function animateNPCMeshes(delta) {
      for (const npc of npcs) {
        if (!npc.mesh || !npc.body) continue;

        syncMeshWithBody(npc.mesh, npc.body);

        // 見た目だけの足元補正
        npc.mesh.position.y += npc.visualYOffset || 0;

        // 進行方向へ向ける
        npc.mesh.rotation.set(0, npc.visualYaw + Math.PI, 0);

        const walking =
          npc.isWalking &&
          state.lickTarget !== npc &&
          npc.stunTimer <= 0;

        const parts = npc.mesh.userData.parts || {};

        if (walking) {
          const t = npc.walkAnimTime;

          // 全体の軽い上下揺れ
          const bounce = Math.abs(Math.sin(t)) * 0.045;
          npc.mesh.position.y += bounce;

          // 少し左右に揺れて歩いている感じを出す
          npc.mesh.rotation.z = Math.sin(t * 0.5) * 0.045;

          if (npc.npcType === "human") {
            // 人型：腕と足を前後に振る
            const swing = Math.sin(t) * 0.75;

            if (parts.leftArmPivot) parts.leftArmPivot.rotation.x = swing;
            if (parts.rightArmPivot) parts.rightArmPivot.rotation.x = -swing;

            if (parts.leftLegPivot) parts.leftLegPivot.rotation.x = -swing * 0.75;
            if (parts.rightLegPivot) parts.rightLegPivot.rotation.x = swing * 0.75;

            if (parts.head) {
              parts.head.position.y = 1.28 + Math.abs(Math.sin(t)) * 0.025;
            }

            npc.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.2);
          }

          if (npc.npcType === "dog") {
            // 犬型：前足と後ろ足を交互に振る
            const swing = Math.sin(t) * 0.65;
            const opposite = -swing;

            if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x = swing;
            if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x = swing;

            if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x = opposite;
            if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x = opposite;

            if (parts.tail) {
              parts.tail.rotation.y = Math.sin(t * 1.6) * 0.45;
              parts.tail.rotation.x = -0.55 + Math.cos(t * 1.6) * 0.12;
            }

            if (parts.head) {
              parts.head.position.y = 0.55 + Math.abs(Math.sin(t)) * 0.025;
            }

            npc.mesh.scale.set(
              1.0 + Math.sin(t) * 0.025,
              1.0,
              1.0 + Math.cos(t) * 0.025
            );
          }
        } else {
          // 停止時はパーツを自然に戻す
          npc.mesh.rotation.z *= 0.85;

          if (parts.leftArmPivot) parts.leftArmPivot.rotation.x *= 0.8;
          if (parts.rightArmPivot) parts.rightArmPivot.rotation.x *= 0.8;
          if (parts.leftLegPivot) parts.leftLegPivot.rotation.x *= 0.8;
          if (parts.rightLegPivot) parts.rightLegPivot.rotation.x *= 0.8;

          if (parts.frontLeftLegPivot) parts.frontLeftLegPivot.rotation.x *= 0.8;
          if (parts.frontRightLegPivot) parts.frontRightLegPivot.rotation.x *= 0.8;
          if (parts.backLeftLegPivot) parts.backLeftLegPivot.rotation.x *= 0.8;
          if (parts.backRightLegPivot) parts.backRightLegPivot.rotation.x *= 0.8;

          if (parts.tail) {
            parts.tail.rotation.y *= 0.8;
            parts.tail.rotation.x += (-0.55 - parts.tail.rotation.x) * 0.2;
          }

          npc.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.15);
        }
      }
    }

    function syncObjects(delta) {
      for (const obj of gameObjects) {
        if (!obj.mesh || !obj.body) continue;

        // NPCは専用アニメーション側で同期する
        if (obj.isNPC) continue;

        // 大砲は固定Bodyだが、ベロで見た目の向きだけ変更できるため専用同期する
        if (obj.isCannon) {
          syncCannonVisual(obj);
          continue;
        }

        syncMeshWithBody(obj.mesh, obj.body);

        if (obj.visualYOffset) {
          obj.mesh.position.y += obj.visualYOffset;
        }

        if (obj.visualType === "titleSignBoard") {
          updateTitleSignVisual(obj, delta);
        }

        if (obj.isLegendarySword && obj.mesh.userData) {
          obj.mesh.userData.animTime = (obj.mesh.userData.animTime || 0) + 0.035;
          const t = obj.mesh.userData.animTime;
          if (obj.mesh.userData.aura) {
            obj.mesh.userData.aura.scale.setScalar(1 + Math.sin(t * 2.2) * 0.08);
          }
          if (obj.mesh.userData.light) {
            obj.mesh.userData.light.intensity = 2.6 + Math.sin(t * 3.0) * 0.55;
          }
        }

        updateBreakableSpawnProtection(obj, delta);

        // 伝説の剣がマップ外へ落下した場合は、初期位置の真上から再出現させる。
        // ランダム位置にはせず、必ず元の場所へ落ちてくるようにする。
        if (obj.isLegendarySword && obj.body.position.y < FALL_RESET_Y) {
          const base = obj.initialSpawnPosition || new THREE.Vector3(48, 11.25, 40);
          const respawnY = base.y + (obj.respawnHeightOffset || 12);

          if (state.lickTarget === obj) {
            releaseLick();
          }

          obj.body.position.set(base.x, respawnY, base.z);
          obj.body.velocity.set(0, 0, 0);
          obj.body.angularVelocity.set(0, 0, 0);
          obj.body.force.set(0, 0, 0);
          obj.body.torque.set(0, 0, 0);
          obj.body.quaternion.set(0, 0, 0, 1);
          obj.body.wakeUp();
          showMessage("伝説の剣が元の場所に戻った！");
        }

        // 破壊可能オブジェクトがマップ外へ落下した場合は、
        // ランダムな高い位置から再出現させる。着地までは破壊保護をかける。
        if (obj.breakable && obj.body.position.y < FALL_RESET_Y) {
          const respawnPosition = getRandomSpawnHighPosition();
          obj.body.position.set(respawnPosition.x, respawnPosition.y, respawnPosition.z);
          obj.body.velocity.set(0, 0, 0);
          obj.body.angularVelocity.set(0, 0, 0);
          obj.body.force.set(0, 0, 0);
          obj.body.torque.set(0, 0, 0);
          obj.body.quaternion.set(0, 0, 0, 1);
          obj.body.wakeUp();
          protectBreakableUntilGrounded(obj);
        }
      }
    }

    function cleanupTooManyDebris() {
      const debris = gameObjects.filter((obj) => obj.name === "debris");

      if (debris.length <= 35) return;

      const removeCount = debris.length - 35;

      for (let i = 0; i < removeCount; i++) {
        const obj = debris[i];
        if (obj.mesh.parent) scene.remove(obj.mesh);
        if (obj.body.world) world.removeBody(obj.body);

        const idx = gameObjects.indexOf(obj);
        if (idx >= 0) gameObjects.splice(idx, 1);
      }
    }

    // =========================================================
    //  初期化
    // =========================================================

    function init() {
      createGround();
      createBoundary();
      createMapProps();
      createJumpPads();
      createObjects();
      createNPCs();
      setupControls();
      updateMission();

      camera.position.set(0, 6, -8);
      camera.lookAt(0, 1, 0);

      window.addEventListener("resize", onResize);

      startButton.addEventListener("pointerdown", () => {
        startOverlay.style.display = "none";
        state.started = true;

        // ゲーム開始直後、空中配置オブジェクトが地面に落ちるまでの間は
        // 衝突破壊・衝突スコアを発生させない
        state.startProtectionTimer = 3.0;

        showMessage("ゲーム開始！準備中...");
      });

      animate();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();

      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // =========================================================
    //  メインループ
    // =========================================================

    let fixedTimeStep = 1 / 60;
    let maxSubSteps = 5;

    function animate() {
      requestAnimationFrame(animate);

      const delta = Math.min(clock.getDelta(), 0.05);

      if (state.started) {
        if (state.startProtectionTimer > 0) {
          state.startProtectionTimer = Math.max(0, state.startProtectionTimer - delta);

          if (state.startProtectionTimer === 0) {
            showMessage("暴れてOK！");
          }
        }

        updatePlayer(delta);
        updateNPCs(delta);
        updateCombo(delta);
        updateMessage(delta);
        updateCamera(delta);
        updateExplosionEffects(delta);
        updateSpawnButton(delta);
        updateJumpPads(delta);
        updateCannons(delta);
        cleanupTooManyDebris();

        world.step(fixedTimeStep, delta, maxSubSteps);

        syncObjects(delta);
        animateNPCMeshes(delta);

        // プレイヤーが落ちたら復帰
        if (player.body.position.y < FALL_RESET_Y) {
          resetPlayer();
          showMessage("落下！初期位置に戻りました");
        }
      } else {
        updateCamera(delta);
      }

      renderer.render(scene, camera);
    }

    init();
  </script>
