<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>ヤーギ シミュレーター</title>

  <style>

    /*
      =========================================================
        CSS設定メモ
      =========================================================
      ・px      : 画面上の大きさ/余白/位置を指定します。
      ・rgba    : 色と透明度です。最後の値 0〜1 が透明度です。
      ・z-index : 数字が大きいほど手前に表示されます。
      ・grid-column / grid-row : 右下アクションボタンの並び順を決めます。
      ・@media  : スマホなど画面幅が狭い時だけ反映される設定です。
    */
    html,
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100%;
      height: 100%;
      background: #87ceeb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      touch-action: none;
      user-select: none;
    }

    #game {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #hud {
      position: fixed;
      inset: 0;
      pointer-events: none;
      color: white;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.65);
      z-index: 10;
    }

    #topBar {
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    #scorePanel,
    #missionPanel,
    #helpPanel {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 10px 12px;
      backdrop-filter: blur(4px);
    }

    #scorePanel {
      min-width: 135px;
    }

    #score {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.1;
    }

    #combo {
      margin-top: 4px;
      font-size: 14px;
      color: #ffe66d;
    }

    #missionPanel {
      max-width: 45vw;
      text-align: center;
      font-size: 14px;
      line-height: 1.45;
    }

    #missionTitle {
      font-weight: 800;
      color: #a8ffb0;
      margin-bottom: 2px;
    }

    #missionPanel {
      pointer-events: auto;
      cursor: pointer;
    }

    #missionText {
      font-size: 13px;
    }

    #missionHint {
      margin-top: 4px;
      font-size: 11px;
      opacity: 0.85;
    }

    #missionOverlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: grid;
      place-items: center;
      background: rgba(0, 0, 0, 0.55);
      color: white;
      padding: 18px;
    }

    #missionOverlay.hidden {
      display: none;
    }

    #missionCard {
      width: min(92vw, 620px);
      max-height: 82vh;
      overflow: auto;
      background: rgba(20, 24, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.45);
    }

    #missionCardHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    #missionCardHeader h2 {
      margin: 0;
      font-size: 22px;
    }

    #missionCloseButton {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 900;
      background: white;
      color: #222;
    }

    #missionList {
      display: grid;
      gap: 10px;
    }

    .missionItem {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .missionItem.completed {
      background: rgba(80, 220, 120, 0.18);
      border-color: rgba(120, 255, 160, 0.45);
    }

    .missionItem.secretMission {
      background: linear-gradient(135deg, rgba(120, 70, 220, 0.22), rgba(255, 210, 80, 0.16));
      border-color: rgba(255, 230, 120, 0.55);
      box-shadow: 0 0 18px rgba(255, 230, 120, 0.18);
    }

    .missionMark {
      font-size: 22px;
      line-height: 1.2;
      text-align: center;
    }

    .missionName {
      font-weight: 900;
      margin-bottom: 4px;
    }

    .missionDesc {
      font-size: 13px;
      opacity: 0.9;
      line-height: 1.45;
    }

    .missionProgress {
      margin-top: 6px;
      font-size: 12px;
      color: #ffe66d;
    }

    #helpPanel {
      font-size: 12px;
      line-height: 1.45;
      max-width: 310px;
    }

    #message {
      position: absolute;
      top: 82px;
      left: 50%;
      transform: translateX(-50%);
      min-width: 220px;
      max-width: 80vw;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.55);
      text-align: center;
      font-weight: 800;
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #message.show {
      opacity: 1;
      transform: translateX(-50%) translateY(4px);
    }

    #missionClearToast {
      position: fixed;
      top: 120px;
      left: 50%;
      transform: translateX(-50%) scale(0.96);
      z-index: 80;
      min-width: 280px;
      max-width: 88vw;
      padding: 16px 22px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255, 232, 95, 0.96), rgba(255, 152, 67, 0.96));
      color: #2b1600;
      text-align: center;
      font-weight: 900;
      box-shadow: 0 10px 34px rgba(0, 0, 0, 0.45);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #missionClearToast.show {
      opacity: 1;
      transform: translateX(-50%) scale(1);
    }

    #missionClearToast .small {
      margin-top: 4px;
      font-size: 13px;
      opacity: 0.9;
    }

    #missionClearToast.secretMissionToast {
      background: linear-gradient(135deg, rgba(155, 92, 255, 0.98), rgba(255, 230, 92, 0.98), rgba(255, 92, 160, 0.98));
      color: #180022;
      box-shadow: 0 0 28px rgba(255, 235, 110, 0.8), 0 14px 50px rgba(0, 0, 0, 0.45);
      animation: secretToastPop 0.65s ease-out;
    }

    @keyframes secretToastPop {
      0% { transform: translateX(-50%) scale(0.7) rotate(-3deg); }
      55% { transform: translateX(-50%) scale(1.08) rotate(2deg); }
      100% { transform: translateX(-50%) scale(1) rotate(0); }
    }

    #controls {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 20;
    }

    #joystickArea {
      position: absolute;
      left: 22px;
      bottom: 28px;
      width: 142px;
      height: 142px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.22);
      border: 2px solid rgba(255, 255, 255, 0.32);
      pointer-events: auto;
      touch-action: none;
    }

    #joystickKnob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      margin-left: -29px;
      margin-top: -29px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    /* 右下アクションボタン全体の配置です。 */
    #actionButtons {
      position: absolute;
      right: 18px;
      bottom: 24px;
      display: grid;
      grid-template-columns: 74px 74px;
      grid-template-rows: 74px 74px 74px;
      gap: 10px;
      pointer-events: auto;
    }

    .actionButton {
      border: none;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.84);
      color: #111;
      font-weight: 900;
      font-size: 13px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.32);
      touch-action: none;
    }

    .actionButton:active {
      transform: scale(0.94);
      background: white;
    }

    /* JUMPボタンの位置と色です。grid-row/columnで並びを変えられます。 */
    #btnJump {
      grid-column: 2;
      grid-row: 3;
      background: rgba(124, 217, 255, 0.9);
    }

    /* 頭突きボタンの位置と色です。 */
    #btnHeadbutt {
      grid-column: 1;
      grid-row: 2;
      background: rgba(255, 230, 109, 0.92);
    }

    /* ベロボタンの位置と色です。 */
    #btnLick {
      grid-column: 2;
      grid-row: 2;
      background: rgba(255, 139, 179, 0.92);
    }

    /* DASHボタンの位置と色です。 */
    #btnDash {
      grid-column: 1;
      grid-row: 3;
      background: rgba(168, 255, 176, 0.92);
    }

    /* RESETボタンの位置と色です。 */
    #btnReset {
      grid-column: 2;
      grid-row: 1;
      background: rgba(255, 170, 122, 0.92);
    }

    #startOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 25%, rgba(255, 255, 255, 0.2), transparent 30%),
        linear-gradient(180deg, #73c7ff, #87ceeb 42%, #89d06b 42%);
      color: white;
      text-align: center;
    }

    #startCard {
      width: min(90vw, 560px);
      /* STARTボタン下にバージョン表記を置くため、下方向だけ少し広げる */
      padding: 24px 24px 34px;
      border-radius: 24px;
      background: rgba(0, 0, 0, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.32);
      box-shadow: 0 12px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(6px);
    }

    #startCard h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    #startCard p {
      margin: 8px 0;
      line-height: 1.6;
      font-size: 14px;
    }

    #startButton {
      margin-top: 18px;
      border: none;
      border-radius: 999px;
      padding: 16px 36px;
      font-size: 20px;
      font-weight: 900;
      background: #4caf50;
      color: white;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
    }

    #startButton:active {
      transform: scale(0.96);
    }

    /* スタート画面のバージョン表記です。 */
    #versionText {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      color: rgba(255, 255, 255, 0.82);
    }

    .floatingScore {
      position: fixed;
      z-index: 30;
      color: #fff36d;
      font-weight: 900;
      font-size: 22px;
      text-shadow: 0 2px 5px black;
      pointer-events: none;
      animation: floatScore 0.9s ease-out forwards;
    }

    @keyframes floatScore {
      0% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -120%) scale(1.3);
      }
    }

    @media (max-width: 760px) {
      #helpPanel {
        display: none;
      }

      #missionPanel {
        max-width: 55vw;
        font-size: 12px;
      }

      #score {
        font-size: 22px;
      }

      #joystickArea {
        width: 132px;
        height: 132px;
        left: 16px;
        bottom: 20px;
      }

      #actionButtons {
        right: 12px;
        bottom: 16px;
        grid-template-columns: 68px 68px;
        grid-template-rows: 68px 68px 68px;
      }

      .actionButton {
        border-radius: 20px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="topBar">
      <div id="scorePanel">
        <div>スコア</div>
        <div id="score">0</div>
        <div id="combo">COMBO x1.0</div>
      </div>

      <div id="missionPanel">
        <div id="missionTitle">MISSION</div>
        <div id="missionText">ミッション確認中...</div>
        <div id="missionHint">タップで一覧</div>
      </div>

      <div id="helpPanel">
        <b>PC操作</b><br />
        WASD：移動 / Space：ジャンプ<br />
        E：頭突き / Q：ベロ / Shift：ダッシュ<br />
        R：リセット / ドラッグ：カメラ回転
      </div>
    </div>

    <div id="message"></div>
    <div id="missionClearToast"></div>
  </div>

  <div id="controls">
    <div id="joystickArea">
      <div id="joystickKnob"></div>
    </div>

    <div id="actionButtons">
      <button id="btnJump" class="actionButton">JUMP</button>
      <button id="btnHeadbutt" class="actionButton">頭突き</button>
      <button id="btnLick" class="actionButton">ベロ</button>
      <button id="btnDash" class="actionButton">DASH</button>
      <button id="btnReset" class="actionButton">RESET</button>
    </div>
  </div>

  <div id="startOverlay">
    <div id="startCard">
      <h1>ヤーギ シミュレーター</h1>
      <p>
        ヤギ風キャラを操作して、箱・車・などを吹き飛ばそう。<br />
        頭突き、ジャンプ、ベロつかみ の 破壊3Dミニゲームです。
      </p>
      <p>
        スマホ：左スティックで移動、右ボタンでアクション。<br />
        PC：WASD / Space / E / Q / Shift / R。
      </p>
      <button id="startButton">START</button>
      <div id="versionText">Ver.1.2.5</div>
    </div>
  </div>

  <div id="missionOverlay" class="hidden">
    <div id="missionCard">
      <div id="missionCardHeader">
        <h2>MISSION一覧</h2>
        <button id="missionCloseButton">閉じる</button>
      </div>
      <div id="missionList"></div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";
    import * as CANNON from "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js";


    /*
      =========================================================
        設定変更ガイド
      =========================================================
      このファイルは 1 ファイル完結の3Dゲームです。
      数値を変更するときは、主に以下の単位・意味で見ます。

      【Three.js / Cannon.js の座標】
      ・X : 左右方向。プラスは右方向、マイナスは左方向。
      ・Y : 高さ方向。プラスは上、マイナスは下。
      ・Z : 奥行き方向。プラス/マイナスで前後方向。
      ・position: new THREE.Vector3(x, y, z)
          → オブジェクトの配置位置です。
      ・size: new THREE.Vector3(x, y, z)
          → オブジェクトの横幅・高さ・奥行きです。

      【物理系のよく使う値】
      ・mass        : 重さ。大きいほど動きにくく、吹き飛びにくいです。
      ・friction    : 摩擦。大きいほど地面や物体に引っかかりやすいです。
      ・restitution : 反発。大きいほど跳ね返ります。
      ・linearDamping  : 移動速度の減衰。大きいほどすぐ止まります。
      ・angularDamping : 回転速度の減衰。大きいほど回転しにくいです。
      ・hp          : 耐久値。大きいほど壊れにくいです。
      ・score       : 破壊時にもらえる基本スコアです。

      【ゲーム調整でよく触る場所】
      ・state                 : ゲーム全体の状態、カメラ初期角度、クールタイムなど。
      ・PLAYER_START_POSITION : プレイヤーの初期位置。
      ・createMapProps()      : 道路、高台、階段、看板、剣、ボタンなどのマップ配置。
      ・createObjects()       : 最初から置かれる破壊可能オブジェクトの数や耐久値。
      ・createNPCs()          : 最初から出るNPCの人数・犬の数・速度。
      ・missions              : ミッション内容、達成条件、報酬。
      ・updatePlayer()        : プレイヤーの移動速度、ダッシュ、操作感。
      ・headbutt()            : 頭突きの範囲、威力、クールタイム。
      ・updateCamera()        : カメラ距離、高さ、追従のなめらかさ。
    */

    // =========================================================
    //  基本設定
    // =========================================================

    const canvas = document.getElementById("game");
    const scoreEl = document.getElementById("score");
    const comboEl = document.getElementById("combo");
    const missionTextEl = document.getElementById("missionText");
    const missionPanelEl = document.getElementById("missionPanel");
    const missionOverlayEl = document.getElementById("missionOverlay");
    const missionListEl = document.getElementById("missionList");
    const missionCloseButtonEl = document.getElementById("missionCloseButton");
    const messageEl = document.getElementById("message");
    const missionClearToastEl = document.getElementById("missionClearToast");
    const startOverlay = document.getElementById("startOverlay");
    const startButton = document.getElementById("startButton");

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: "high-performance"
    });

    // 描画解像度の上限です。大きいほど綺麗ですが重くなります。
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.7));
    renderer.setSize(window.innerWidth, window.innerHeight);
    // 影の描画ON/OFFです。false にすると軽くなりますが影が消えます。
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb);

    scene.fog = new THREE.Fog(0x87ceeb, 60, 170);

    const camera = new THREE.PerspectiveCamera(
      65, // 視野角。大きいほど広角、小さいほどズーム気味になります。
      window.innerWidth / window.innerHeight, // 画面の縦横比です。
      0.1, // カメラに映る最短距離です。
      500 // カメラに映る最長距離です。
    );

    const clock = new THREE.Clock();

    const world = new CANNON.World({
      // 重力です。Yをさらにマイナスにすると落下が速くなります。
      gravity: new CANNON.Vec3(0, -9.82, 0)
    });

    // 物理計算の精度です。大きいほど安定しますが重くなります。
    world.solver.iterations = 12;
    // 物理計算の許容誤差です。小さいほど精密ですが重くなります。
    world.solver.tolerance = 0.001;

    world.allowSleep = true;
    world.broadphase = new CANNON.SAPBroadphase(world);

    const defaultMaterial = new CANNON.Material("default");
    const groundMaterial = new CANNON.Material("ground");
    const bouncyMaterial = new CANNON.Material("bouncy");

    world.defaultContactMaterial = new CANNON.ContactMaterial(
      defaultMaterial,
      defaultMaterial,
      {
        friction: 0.45,    // 通常物体同士の摩擦です。
        restitution: 0.28  // 通常物体同士の跳ね返りです。
      }
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(defaultMaterial, groundMaterial, {
        friction: 0.8,     // 通常物体と地面の摩擦です。
        restitution: 0.18  // 通常物体と地面の跳ね返りです。
      })
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(bouncyMaterial, groundMaterial, {
        // 自キャラが地面に引っかかる感じを減らす
        friction: 0.08,    // プレイヤーと地面の摩擦です。大きいと引っかかりやすくなります。
        restitution: 0.02  // プレイヤーと地面の跳ね返りです。
      })
    );

    world.addContactMaterial(
      new CANNON.ContactMaterial(bouncyMaterial, defaultMaterial, {
        // 箱・車・板・NPCに触れたときに引っかかりすぎないようにする
        friction: 0.12,    // プレイヤーと箱/NPCなどの摩擦です。
        restitution: 0.02  // プレイヤーと箱/NPCなどの跳ね返りです。
      })
    );

    // =========================================================
    //  ゲーム状態
    // =========================================================

    const state = {
      // ゲーム開始済みかどうか。START押下後に true になります。
      started: false,

      // ゲーム開始直後に、落下や初期衝突で壊れないようにする保護時間です。秒単位。
      startProtectionTimer: 0,

      // スコア関連。score は現在スコア、comboMultiplier は倍率です。
      score: 0,
      comboCount: 0,
      comboMultiplier: 1,
      comboTimer: 0,

      // 破壊数関連。destroyedByName は「箱」「板」など名前別の破壊数です。
      destroyedCount: 0,
      destroyedByName: {},

      // アクションのクールタイム。0より大きい間は再使用できません。
      headbuttCooldown: 0,
      jumpCooldown: 0,
      dashTime: 0,
      dashCooldown: 0,

      // カメラ初期角度。
      // cameraYaw   : 左右の向き。0 が初期方向です。
      // cameraPitch : 上下の向き。マイナスにすると少し上向き、プラスにすると少し下向きです。
      cameraYaw: 0,
      cameraPitch: -0.05,

      // プレイヤーが地面/足場に乗っているかどうか。ジャンプ可否に使います。
      isGrounded: false,

      // ベロで掴んでいる対象。null のときは何も掴んでいません。
      lickTarget: null,
      lickLine: null,

      // ミッションと伝説の剣の状態です。
      missionCompleted: false,
      hasLegendarySword: false,

      // 追加ギミック/隠しミッション用のカウントです。
      jumpPadLaunchCount: 0,
      cannonLaunchCount: 0,
      legendaryPowerHeadbuttCount: 0,
      cannonLaunchByName: {},
      legendaryPowerHeadbuttByName: {},

      // 画面中央メッセージの表示残り時間。秒単位です。
      messageTimer: 0
    };

    const keys = {
      // PCキーボード入力の状態です。
      // true の間、その方向/アクションが押されている扱いになります。
      forward: false, // Wキー：前進

    // ミッション達成トーストを順番に表示するためのキューです。
    // 通常ミッションと隠しミッションが同時・連続で達成された場合でも、
    // 後から表示された通知が前の通知の setTimeout に消されないようにする。
    let missionToastQueue = [];
    let missionToastShowing = false;
    let missionToastTimerId = null;

    function enqueueMissionToast(toast) {
      if (!missionClearToastEl) return;

      // 隠しミッションは、まだ表示待ちの通常ミッションより前に入れる。
      // ただし、現在表示中のトーストは途中で消さず、表示完了後に続けて出す。
      if (toast.secret) {
        const firstNormalIndex = missionToastQueue.findIndex((item) => !item.secret);
        if (firstNormalIndex >= 0) {
          missionToastQueue.splice(firstNormalIndex, 0, toast);
        } else {
          missionToastQueue.push(toast);
        }
      } else {
        missionToastQueue.push(toast);
      }

      processMissionToastQueue();
    }

    function processMissionToastQueue() {
      if (!missionClearToastEl || missionToastShowing) return;

      const toast = missionToastQueue.shift();
      if (!toast) return;

      missionToastShowing = true;

      const titleText = toast.count > 1
        ? `${toast.prefix} x${toast.count}`
        : toast.prefix;

      missionClearToastEl.classList.remove("show");
      missionClearToastEl.classList.toggle("secretMissionToast", !!toast.secret);

      missionClearToastEl.innerHTML = toast.secret
        ? `
          <div>㊙ ${titleText} ㊙</div>
          <div>${toast.title}</div>
          <div class="small">隠しミッション達成！ 追加報酬 +${toast.reward}</div>
        `
        : `
          <div>${titleText}</div>
          <div>${toast.title}</div>
          <div class="small">追加報酬 +${toast.reward}</div>
        `;

      window.setTimeout(() => {
        missionClearToastEl.classList.add("show");
      }, 20);

      if (missionToastTimerId) {
        clearTimeout(missionToastTimerId);
      }

      const duration = toast.secret ? 3400 : 2600;
      missionToastTimerId = setTimeout(() => {
        missionClearToastEl.classList.remove("show");

        setTimeout(() => {
          missionClearToastEl.classList.remove("secretMissionToast");
          missionToastShowing = false;
          processMissionToastQueue();
        }, 220);
      }, duration);
    }

    function addScore(points, worldPosition, options = {}) {
      const gained = Math.round(points * state.comboMultiplier);
      state.score += gained;
      state.comboCount += 1;
      state.comboTimer = 2.3;

      if (state.comboCount >= 11) {
        state.comboMultiplier = 3;
      } else if (state.comboCount >= 6) {
        state.comboMultiplier = 2;
      } else if (state.comboCount >= 3) {
        state.comboMultiplier = 1.5;
      } else {
        state.comboMultiplier = 1;
      }

      scoreEl.textContent = String(state.score);
      comboEl.textContent = `COMBO x${state.comboMultiplier.toFixed(1)} / ${state.comboCount}`;

      if (worldPosition) {
        spawnFloatingScore(gained, worldPosition);
      }

      if (!options.skipMissionUpdate && state.started) {
        updateMission();
      }
    }

    function updateCombo(delta) {
      if (state.comboTimer > 0) {
        state.comboTimer -= delta;
        if (state.comboTimer <= 0) {
          state.comboCount = 0;
          state.comboMultiplier = 1;
          comboEl.textContent = "COMBO x1.0";

    function spawnFloatingScore(points, worldPosition) {
      const projected = worldPosition.clone().project(camera);

      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      el.className = "floatingScore";
      el.textContent = `+${points}`;
      el.style.left = `${x}px`;

      setTimeout(() => {

    function syncMeshWithBody(mesh, body) {
      mesh.position.set(body.position.x, body.position.y, body.position.z);
      mesh.quaternion.set(body.quaternion.x, body.quaternion.y, body.quaternion.z, body.quaternion.w);

    function enableShadowForObject3D(object3d) {
      object3d.traverse((child) => {

      });
    }

    function lerpAngle(from, to, t) {
      let diff = ((to - from + Math.PI) % (Math.PI * 2)) - Math.PI;
      if (diff < -Math.PI) diff += Math.PI * 2;
      return from + diff * t;
    }

    function getHorizontalDistance(a, b) {
      const dx = a.x - b.x;
      const dz = a.z - b.z;
      return Math.hypot(dx, dz);
    }

    function getNPCGroundInfo(npc) {
      if (!npc || !npc.body || !npc.size) {
        return { grounded: false, snapY: null };
      }

      const x = npc.body.position.x;
      const y = npc.body.position.y;
      const z = npc.body.position.z;
      const halfY = npc.size.y / 2;
      const bottomY = y - halfY;
      const notFlyingUpFast = npc.body.velocity.y <= 1.25;

      const withinGround =
        Math.abs(x) <= FIELD_HALF_SIZE + 0.4 &&
        Math.abs(z) <= FIELD_HALF_SIZE + 0.4;

      if (withinGround && bottomY <= 0.16 && bottomY >= -0.45 && notFlyingUpFast) {
        return { grounded: true, snapY: halfY + 0.04 };
      }

      for (const platform of staticPlatforms) {
        const topY = platform.position.y + platform.size.y / 2;
        const withinX = Math.abs(x - platform.position.x) <= platform.size.x / 2 + 0.55;
        const withinZ = Math.abs(z - platform.position.z) <= platform.size.z / 2 + 0.55;
        const nearTop = bottomY >= topY - 0.22 && bottomY <= topY + 0.34;

        if (withinX && withinZ && nearTop && notFlyingUpFast) {
          return { grounded: true, snapY: topY + halfY + 0.03 };
        }
      }

      return { grounded: false, snapY: null };
    }

    function lockNPCAfterCannonLaunch(npc) {
      if (!npc || !npc.isNPC) return;

      // 大砲で飛ばされた直後は、空中で自律歩行を再開しないようにする。
      // 特に犬型NPCは体高が低く、従来は stunTimer 終了後に空中で歩き始めて、
      // そのまま空中移動して浮いた位置に戻ることがあった。
      npc.cannonAirborneLock = true;
      npc.cannonFlightTimer = npc.npcType === "dog" ? 9.0 : 6.0;
      npc.stunTimer = Math.max(npc.stunTimer || 0, 0.45);
      npc.isWalking = false;
    }

    function createNoiseTexture({
      baseColor = "#ffffff",
      noiseColor = "#cccccc",
      size = 256,
      cellSize = 8,
      lineColor = null,
      lineEvery = 32
    } = {}) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");

      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);

      for (let y = 0; y < size; y += cellSize) {
        for (let x = 0; x < size; x += cellSize) {
          const alpha = Math.random() * 0.18;
          ctx.fillStyle = noiseColor;
          ctx.globalAlpha = alpha;
          ctx.fillRect(x, y, cellSize, cellSize);
        }
      }

      ctx.globalAlpha = 1;

      if (lineColor) {
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = 1;

        for (let i = 0; i <= size; i += lineEvery) {
          ctx.beginPath();
          ctx.moveTo(i, 0);
          ctx.lineTo(i, size);
          ctx.stroke();

          ctx.beginPath();
          ctx.moveTo(0, i);
          ctx.lineTo(size, i);
          ctx.stroke();
        }
      }

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.anisotropy = 4;
      texture.needsUpdate = true;

      return texture;
    }

    function createStripeTexture({
      baseColor = "#666666",
      stripeColor = "#777777",
      lineColor = "#ffffff",
      size = 256
    } = {}) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;

      const ctx = canvas.getContext("2d");

      ctx.fillStyle = baseColor;
      ctx.fillRect(0, 0, size, size);

      for (let y = 0; y < size; y += 24) {
        ctx.fillStyle = stripeColor;
        ctx.globalAlpha = 0.35;
        ctx.fillRect(0, y, size, 10);
      }

      // 道路の白線はテクスチャではなく、別メッシュで正確に配置する。
      // ここではアスファルトの横縞だけを作る。
      ctx.globalAlpha = 1;

      const texture = new THREE.CanvasTexture(canvas);
      texture.wrapS = THREE.RepeatWrapping;
      texture.wrapT = THREE.RepeatWrapping;
      texture.anisotropy = 4;
      texture.needsUpdate = true;

      return texture;
    }

    function createGround() {
      // 地面の見た目サイズです。FIELD_SIZEを変更するとマップ全体の広さを調整できます。
      // 後ろ2つの 16, 16 は分割数で、見た目の細かさに関係します。
      const groundGeo = new THREE.PlaneGeometry(FIELD_SIZE, FIELD_SIZE, 16, 16);
      const groundMat = new THREE.MeshStandardMaterial({
        map: textures.grass,
        color: 0xffffff,
        roughness: 0.95,
        metalness: 0.0
      });

      const ground = new THREE.Mesh(groundGeo, groundMat);
      ground.rotation.x = -Math.PI / 2;
      ground.receiveShadow = true;
      scene.add(ground);

      // 物理地面は無限Planeではなく、有限のBoxにする。
      // これにより、外側の水色部分へ出た場合は落下する。
      const groundBody = new CANNON.Body({
        mass: 0,
        type: CANNON.Body.STATIC,
        material: groundMaterial,
        // 地面の物理判定サイズです。表示サイズの半分をX/Zに設定します。
        shape: new CANNON.Box(new CANNON.Vec3(FIELD_HALF_SIZE, 0.1, FIELD_HALF_SIZE))
      });

      groundBody.position.set(0, -0.1, 0);
      groundBody.allowSleep = false;
      world.addBody(groundBody);

      const grid = new THREE.GridHelper(FIELD_SIZE, 48, 0xffffff, 0xffffff);
      grid.material.opacity = 0.12;
      grid.material.transparent = true;

    function createBoundary() {
      // 外枠の壁色です。0xRRGGBB形式の色指定です。
      const wallColor = 0x5d8050;
      const wallY = 1;
      const wallHeight = 2;
      const wallLength = FIELD_SIZE + BOUNDARY_WALL_THICKNESS * 2;
      const wallPos = FIELD_HALF_SIZE + BOUNDARY_WALL_THICKNESS / 2;

      createStaticBox(
        new THREE.Vector3(0, wallY, -wallPos),
        new THREE.Vector3(wallLength, wallHeight, BOUNDARY_WALL_THICKNESS),
        wallColor,
        { name: "boundaryBack", friction: 0.2, restitution: 0.02 }
      );

      createStaticBox(
        new THREE.Vector3(0, wallY, wallPos),
        new THREE.Vector3(wallLength, wallHeight, BOUNDARY_WALL_THICKNESS),
        wallColor,
        { name: "boundaryFront", friction: 0.2, restitution: 0.02 }
      );

      createStaticBox(
        new THREE.Vector3(-wallPos, wallY, 0),
        new THREE.Vector3(BOUNDARY_WALL_THICKNESS, wallHeight, wallLength),
        wallColor,
        { name: "boundaryLeft", friction: 0.2, restitution: 0.02 }
      );

      createStaticBox(
        new THREE.Vector3(wallPos, wallY, 0),
        new THREE.Vector3(BOUNDARY_WALL_THICKNESS, wallHeight, wallLength),
        wallColor,
        { name: "boundaryRight", friction: 0.2, restitution: 0.02 }
      );
    }

    // 固定オブジェクトを作る共通関数です。
    // position : 配置位置。new THREE.Vector3(x, y, z)
    // size     : サイズ。new THREE.Vector3(横幅, 高さ, 奥行き)
    // color    : 見た目の色。0xRRGGBB形式
    // options.name       : 管理用の名前
    // options.friction   : 摩擦
    // options.restitution: 跳ね返り
    function createStaticBox(position, size, color, options = {}) {
      const {
        name = "staticBox",
        // 高台・階段・固定物の上で自キャラが引っかかりすぎないようにする
        friction = 0.12,
        restitution = 0.02
      } = options;

      const useWoodTexture =
        name.includes("brown") ||
        name.includes("Stair") ||
        name === "staticBox";

      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(size.x, size.y, size.z),
        new THREE.MeshStandardMaterial({
          map: useWoodTexture ? textures.wood : null,
          color,
          roughness: 0.8
        })
      );

      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);

      const staticBoxMaterial = new CANNON.Material(`${name}_material`);

      const body = new CANNON.Body({
        mass: 0,
        type: CANNON.Body.STATIC,
        material: staticBoxMaterial,
        shape: new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2))
      });

      body.position.set(position.x, position.y, position.z);
      body.allowSleep = false;
      body.userData = {
        name,
        kind: "staticPlatform",
        size: size.clone()
      };

      world.addBody(body);

      world.addContactMaterial(
        new CANNON.ContactMaterial(staticBoxMaterial, bouncyMaterial, {
          friction,
          restitution
        })
      );

      world.addContactMaterial(
        new CANNON.ContactMaterial(staticBoxMaterial, defaultMaterial, {
          friction,
          restitution
        })
      );

      // AABBを明示的に更新して、固定Bodyの判定を安定させる
      body.aabbNeedsUpdate = true;
      body.updateAABB();

      // 固定オブジェクトの上に乗ったときもジャンプできるように、足場候補として保持する
      staticPlatforms.push({
        body,
        position: position.clone(),
        size: size.clone(),
        name
      });

      return { mesh, body };
    }

    // 道路の白線を作る関数です。
    // centerX/centerZ : 道路の中心位置
    // y               : 白線の高さ。道路より少し上にします。
    // width/length    : 道路の幅と長さ
    function createRoadMarkings(centerX, y, centerZ, width, length) {
      const lineMat = new THREE.MeshBasicMaterial({
        color: 0xffffff,
        transparent: true,
        opacity: 0.88
      });

      const dashLength = 2.6;
      const gapLength = 2.2;
      const lineHeight = 0.025;
      const centerLineWidth = 0.16;
      const edgeLineWidth = 0.10;
      const edgeInset = 0.35;
      const startZ = centerZ - length / 2 + 1.6;
      const endZ = centerZ + length / 2 - 1.6;

      function addDash(x, z, w, l) {
        const dash = new THREE.Mesh(
          new THREE.BoxGeometry(w, lineHeight, l),
          lineMat
        );
        dash.position.set(x, y, z);
        dash.receiveShadow = false;
        dash.castShadow = false;
        scene.add(dash);
      }

      // 中央線：道路幅のど真ん中に点線を置く
      for (let z = startZ; z <= endZ; z += dashLength + gapLength) {
        addDash(centerX, z + dashLength / 2, centerLineWidth, dashLength);
      }

      // 左右端線：道路の両端は白い実線にする。
      // 中央線だけは上の処理で点線のまま残す。
      const leftEdgeX = centerX - width / 2 + edgeInset;
      const rightEdgeX = centerX + width / 2 - edgeInset;
      const edgeLineLength = endZ - startZ;
      const edgeLineCenterZ = (startZ + endZ) / 2;

      addDash(leftEdgeX, edgeLineCenterZ, edgeLineWidth, edgeLineLength);
      addDash(rightEdgeX, edgeLineCenterZ, edgeLineWidth, edgeLineLength);
    }

    function createTitleTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 1024;
      canvas.height = 512;

      const ctx = canvas.getContext("2d");

      const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradient.addColorStop(0, "#ffd84a");
      gradient.addColorStop(1, "#c08a18");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(82, 48, 0, 0.55)";
      ctx.lineWidth = 24;
      ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

      ctx.fillStyle = "rgba(255, 255, 255, 0.18)";
      for (let y = 36; y < canvas.height; y += 58) {
        ctx.fillRect(42, y, canvas.width - 84, 8);
      }

      ctx.textAlign = "center";

      ctx.fillStyle = "#ffffff";
      ctx.fillText("ヤーギ シミュレーター", canvas.width / 2, 185);

      const texture = new THREE.CanvasTexture(canvas);
      texture.anisotropy = 4;

      return texture;
    }

    function createTitleSignDamageMarks(stage) {
      const group = new THREE.Group();
      group.visible = false;

      const crackMat = new THREE.MeshBasicMaterial({
        color: stage === 1 ? 0x5c3a12 : 0x1f1407,
        transparent: true,
        opacity: stage === 1 ? 0.62 : 0.9,
        side: THREE.DoubleSide
      });

      const stainMat = new THREE.MeshBasicMaterial({
        color: stage === 1 ? 0x7a4a19 : 0x2b1a09,
        transparent: true,
        opacity: stage === 1 ? 0.18 : 0.34,
        side: THREE.DoubleSide
      });

      function addCrack(x, y, length, angle, width = 0.035) {
        const crack = new THREE.Mesh(new THREE.PlaneGeometry(width, length), crackMat);
        crack.position.set(x, y, -0.245 - stage * 0.003);
        crack.rotation.z = angle;
        group.add(crack);
      }

      function addStain(x, y, w, h, angle = 0) {
        const stain = new THREE.Mesh(new THREE.PlaneGeometry(w, h), stainMat);
        stain.position.set(x, y, -0.247 - stage * 0.003);
        stain.rotation.z = angle;
        group.add(stain);
      }

      if (stage === 1) {
        addCrack(-1.75, 0.62, 0.85, 0.9);
        addCrack(-1.48, 0.35, 0.45, -0.75);
        addCrack(1.55, -0.48, 0.8, -0.65);
        addCrack(1.25, -0.22, 0.42, 0.8);
        addStain(-1.9, -0.55, 0.75, 0.28, 0.22);
        addStain(1.8, 0.55, 0.65, 0.25, -0.18);
      } else {
        addCrack(-2.05, 0.15, 1.35, 0.3, 0.045);
        addCrack(-1.55, -0.08, 0.72, -0.9, 0.04);
        addCrack(-0.35, 0.75, 1.05, -0.55, 0.045);
        addCrack(0.15, 0.42, 0.62, 0.95, 0.04);
        addCrack(1.65, 0.1, 1.2, 0.82, 0.045);
        addCrack(1.95, -0.38, 0.66, -0.55, 0.04);
        addStain(-1.75, 0.55, 1.05, 0.38, -0.12);
        addStain(0.15, -0.55, 1.35, 0.42, 0.18);
        addStain(1.75, -0.5, 0.95, 0.34, -0.25);
      }

      return group;
    }

    function createTitleSign() {
      // ゲームタイトル看板は、黄色い看板部分と茶色い柱をまとめて1つの高HP破壊可能オブジェクトにする。
      // これにより、地面付近で茶色い柱に頭突きした場合も、看板オブジェクトへのヒットとして扱える。
      const titleTexture = createTitleTexture();
      const group = new THREE.Group();

      const boardSize = new THREE.Vector3(5, 2, 0.4);
      const poleSize = new THREE.Vector3(0.5, 4, 0.5);
      const groupBasePosition = new THREE.Vector3(4, 2.5, 22);
      const boardLocalPosition = new THREE.Vector3(0, 2.35, 0);
      const poleLocalPosition = new THREE.Vector3(0, -0.5, 0);

      const pole = new THREE.Mesh(
        new THREE.BoxGeometry(poleSize.x, poleSize.y, poleSize.z),
        new THREE.MeshStandardMaterial({
          map: textures.wood,
          color: 0x2b2114,
          roughness: 0.82,
          metalness: 0.02
        })
      );
      pole.position.copy(poleLocalPosition);
      pole.castShadow = true;
      pole.receiveShadow = true;
      group.add(pole);

      const board = new THREE.Mesh(
        new THREE.BoxGeometry(boardSize.x, boardSize.y, boardSize.z),
        new THREE.MeshStandardMaterial({
          color: 0xffda4f,
          roughness: 0.78,
          metalness: 0.02
        })
      );
      board.position.copy(boardLocalPosition);
      board.castShadow = true;
      board.receiveShadow = true;
      group.add(board);

      // 表示用テキスト面。看板本体の前面に少しだけ浮かせて貼る。
      const titlePlane = new THREE.Mesh(
        new THREE.PlaneGeometry(4.65, 1.65),
        new THREE.MeshBasicMaterial({
          map: titleTexture,
          transparent: true,
          side: THREE.FrontSide
        })
      );
      titlePlane.position.set(boardLocalPosition.x, boardLocalPosition.y, -0.23);
      // PlaneGeometryの表面をプレイヤー側(-Z方向)へ向け、文字の左右反転を防ぐ
      titlePlane.rotation.y = Math.PI;
      titlePlane.castShadow = false;
      titlePlane.receiveShadow = false;
      group.add(titlePlane);

      const damage50 = createTitleSignDamageMarks(1);
      damage50.position.copy(boardLocalPosition);
      group.add(damage50);

      const damage20 = createTitleSignDamageMarks(2);
      damage20.position.copy(boardLocalPosition);
      group.add(damage20);

      group.position.copy(groupBasePosition);
      enableShadowForObject3D(group);
      scene.add(group);

      const body = new CANNON.Body({
        mass: 0,
        type: CANNON.Body.STATIC,
        material: defaultMaterial
      });
      body.addShape(
        new CANNON.Box(new CANNON.Vec3(boardSize.x / 2, boardSize.y / 2, boardSize.z / 2)),
        new CANNON.Vec3(boardLocalPosition.x, boardLocalPosition.y, boardLocalPosition.z)
      );
      body.addShape(
        new CANNON.Box(new CANNON.Vec3(poleSize.x / 2, poleSize.y / 2, poleSize.z / 2)),
        new CANNON.Vec3(poleLocalPosition.x, poleLocalPosition.y, poleLocalPosition.z)
      );
      body.position.set(groupBasePosition.x, groupBasePosition.y, groupBasePosition.z);
      body.allowSleep = true;
      body.sleepSpeedLimit = 0.08;
      body.sleepTimeLimit = 0.8;
      world.addBody(body);
      body.updateMassProperties();
      body.updateAABB();

      const titleSign = {
        mesh: group,
        body,
        size: new THREE.Vector3(5, 5, 0.6),
        hp: 3500,
        maxHp: 3500,
        score: 1000,
        name: "ゲームタイトル看板",
        breakable: true,
        visualType: "titleSignBoard",
        colorHex: 0xffda4f,
        destroyed: false,
        lastHitTime: 0,
        hitShakeTimer: 0,
        damageStage: 0,
        titleSignParts: {
          board,
          pole,
          titlePlane,
          damage50,
          damage20
        }
      };

      body.userData = titleSign;
      gameObjects.push(titleSign);
      destructibles.push(titleSign);

      body.addEventListener("collide", (event) => {
        handleObjectCollision(titleSign, event);
      });

      return titleSign;
    }

      const debrisColor = obj.hp <= obj.maxHp * 0.2 ? 0x5b3410 : 0xc08a18;

    function updateTitleSignVisual(obj, delta) {
      if (!obj || obj.visualType !== "titleSignBoard" || !obj.titleSignParts) return;

      const ratio = obj.maxHp > 0 ? obj.hp / obj.maxHp : 0;
      const parts = obj.titleSignParts;

      if (ratio <= 0.2) {
        obj.damageStage = 2;
      } else if (ratio <= 0.5) {
        obj.damageStage = 1;
      } else {
        obj.damageStage = 0;
      }

      parts.damage50.visible = obj.damageStage >= 1;
      parts.damage20.visible = obj.damageStage >= 2;

      if (parts.board && parts.board.material) {
        if (obj.damageStage >= 2) {
          parts.board.material.color.setHex(0x9c6e25);
          parts.board.material.roughness = 0.96;
        } else if (obj.damageStage >= 1) {
          parts.board.material.color.setHex(0xd5aa34);
          parts.board.material.roughness = 0.9;
        } else {
          parts.board.material.color.setHex(0xffda4f);
          parts.board.material.roughness = 0.78;
        }
      }

      if (parts.pole && parts.pole.material) {
        if (obj.damageStage >= 2) {
          parts.pole.material.color.setHex(0x3a220c);
        } else if (obj.damageStage >= 1) {
          parts.pole.material.color.setHex(0x4c2f12);
        } else {
          parts.pole.material.color.setHex(0x2b2114);
        }
      }

      obj.hitShakeTimer = Math.max(0, (obj.hitShakeTimer || 0) - delta);
      if (obj.hitShakeTimer > 0) {
        const t = clock.elapsedTime * 42;
        const amp = obj.hitShakeTimer / 0.32;
        obj.mesh.position.x += Math.sin(t) * 0.08 * amp;
        obj.mesh.position.z += Math.cos(t * 0.83) * 0.05 * amp;
        obj.mesh.rotation.z = Math.sin(t * 0.72) * 0.045 * amp;
        obj.mesh.rotation.x = Math.cos(t * 0.64) * 0.018 * amp;
      } else {
        obj.mesh.rotation.x *= 0.82;
        obj.mesh.rotation.z *= 0.82;
      }
    }

    function getRandomJumpPadPosition() {
      // プレイヤー初期位置・大きな高台・外枠に近すぎる位置を避けてランダム配置します。
      for (let i = 0; i < 80; i++) {
        const pos = new THREE.Vector3(rand(-58, 58), 0.42, rand(-58, 58));

        const tooCloseToStart = getHorizontalDistance(pos, PLAYER_START_POSITION) < 10;
        const tooCloseToBrownPlatform = getHorizontalDistance(pos, new THREE.Vector3(48, 0, 40)) < 13;
        const tooCloseToGrayPlatform = getHorizontalDistance(pos, new THREE.Vector3(-48, 0, -36)) < 13;
        const tooCloseToRoadCenter = Math.abs(pos.x + 18) < 9 && Math.abs(pos.z) < 45;

        if (!tooCloseToStart && !tooCloseToBrownPlatform && !tooCloseToGrayPlatform && !tooCloseToRoadCenter) {
          return pos;
        }
      }

      return new THREE.Vector3(rand(-48, 48), 0.42, rand(-48, 48));
    }

    function getCannonHorizontalDirection(cannon) {
      const yaw = cannon ? cannon.yaw || 0 : 0;
      return new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
    }

    function getCannonDirection(cannon) {
      const horizontalDir = getCannonHorizontalDirection(cannon);
      return new THREE.Vector3(
        horizontalDir.x * Math.cos(CANNON_PITCH),
        Math.sin(CANNON_PITCH),
        horizontalDir.z * Math.cos(CANNON_PITCH)
      ).normalize();
    }

    function getCannonMouthPosition(cannon) {
      const horizontalDir = getCannonHorizontalDirection(cannon);
      const launchDir = getCannonDirection(cannon);
      return cannon.position.clone()
        .add(horizontalDir.multiplyScalar(2.05))
        .add(new THREE.Vector3(0, 0.92, 0))
        .add(launchDir.multiplyScalar(0.55));
    }

    function syncCannonVisual(cannon) {
      if (!cannon || !cannon.mesh) return;
      cannon.mesh.position.copy(cannon.position);
      cannon.mesh.rotation.y = cannon.yaw || 0;

    function getTargetHalfHeight(target) {
      if (!target) return 0.8;
      if (target.isPlayer) return 0.72;
      if (target.obj && target.obj.size && typeof target.obj.size.y === "number") {
        return target.obj.size.y / 2;
      }
      if (target.obj && target.obj.npcType === "dog") return 0.48;
      if (target.obj && target.obj.npcType === "human") return 0.95;
      return 0.8;
    }

    function getTargetHorizontalRadius(target) {
      if (!target) return 0.7;
      if (target.isPlayer) return 0.72;
      if (target.obj && target.obj.size) {
        return Math.max(target.obj.size.x || 0.8, target.obj.size.z || 0.8) / 2;
      }
      if (target.obj && target.obj.npcType === "dog") return 0.55;
      if (target.obj && target.obj.npcType === "human") return 0.55;
      return 0.7;
    }

    function getCannonHoldPosition(cannon, target) {
      const horizontalDir = getCannonHorizontalDirection(cannon);
      const dir = getCannonDirection(cannon);
      const halfHeight = getTargetHalfHeight(target);

      // 大砲の中に入っているように見える位置へ固定する。
      // 以前より少し上げ、プレイヤーの足元が砲身下へ沈み込みすぎないようにする。
      return cannon.position.clone()
        .add(horizontalDir.multiplyScalar(1.35))
        .add(new THREE.Vector3(0, 1.55 + Math.min(halfHeight * 0.25, 0.35), 0))
        .add(dir.multiplyScalar(0.18));
    }

    function getCannonLaunchTargets() {
      const breakableTargets = destructibles
        .filter((obj) => obj && obj.body && !obj.destroyed && obj.breakable)
        .map((obj) => ({ obj, body: obj.body, isPlayer: false, isBreakable: true, isObjectTarget: true, name: obj.name }));

      // 伝説の剣・ジャンプ台も大砲に入れて発射できる対象に含める。
      // どちらも破壊不能なので destructibles には含まれないため、gameObjects側から拾う。
      const gimmickTargets = gameObjects
        .filter((obj) => obj && obj.body && !obj.destroyed && !obj.isCannon && (obj.isLegendarySword || obj.visualType === "jumpPad"))
        .map((obj) => ({ obj, body: obj.body, isPlayer: false, isObjectTarget: true, name: obj.name }));

      return [
        { obj: player, body: player.body, isPlayer: true, name: "自キャラ" },
        ...npcs.map((npc) => ({ obj: npc, body: npc.body, isPlayer: false, name: npc.name })),
        ...breakableTargets,
        ...gimmickTargets
      ];
    }

    function isTargetInsideCannon(cannon, target) {
      if (!cannon || !target || !target.body) return false;
      if (target.obj && target.obj.destroyed) return false;
      if (cannon.cooldown > 0) return false;

      const mouth = getCannonMouthPosition(cannon);
      const pos = cannonToThreeVec3(target.body.position);
      const halfHeight = getTargetHalfHeight(target);
      const radius = getTargetHorizontalRadius(target);
      const horizontalDistance = getHorizontalDistance(pos, mouth);
      const bottomY = pos.y - halfHeight;
      const verticalDistance = Math.abs(pos.y - mouth.y);

      // 自キャラ/NPCは中心が口元に入ったら反応。
      // 破壊可能オブジェクト・伝説の剣・ジャンプ台はサイズ差があるため、中心だけでなく底面も考慮する。
      if (target.isBreakable || target.isObjectTarget) {
        return horizontalDistance < 1.15 + Math.min(radius, 1.6) && bottomY < mouth.y + 1.1 && pos.y > mouth.y - 0.6;
      }

      return horizontalDistance < 1.25 && verticalDistance < 1.55;
    }

    function startCannonCountdown(cannon, target) {
      cannon.countdownTarget = target;
      cannon.countdownTimer = 3.0;
      cannon.countdownLastNumber = 3;
      cannon.cooldown = 0.25;

      if (target.obj && target.obj.isNPC) {
        target.obj.stunTimer = 3.6;
        target.obj.isWalking = false;
      }

      showMessage("大砲発射まで 3");
    }

    function updateCannonCountdown(cannon, delta) {
      const target = cannon.countdownTarget;
      if (!target || !target.body) {
        cannon.countdownTarget = null;
        return;
      }

      const dir = getCannonDirection(cannon);
      // カウントダウン中は、対象を斜め上向きの砲身の中に固定します。
      // 自キャラ・NPC・破壊可能オブジェクトの高さを考慮して、少し上めに保持します。
      const holdPos = getCannonHoldPosition(cannon, target);

      target.body.position.set(holdPos.x, holdPos.y, holdPos.z);
      target.body.quaternion.set(0, 0, 0, 1);
      target.body.velocity.set(0, 0, 0);
      target.body.angularVelocity.set(0, 0, 0);
      target.body.wakeUp();

      if (target.obj && target.obj.isNPC) {
        target.obj.stunTimer = Math.max(target.obj.stunTimer, 0.35);
        target.obj.isWalking = false;
      }

      cannon.countdownTimer -= delta;
      const nextNumber = Math.ceil(cannon.countdownTimer);

      if (nextNumber > 0 && nextNumber < cannon.countdownLastNumber) {
        cannon.countdownLastNumber = nextNumber;
        showMessage(`大砲発射まで ${nextNumber}`);
      }

      if (cannon.countdownTimer <= 0) {
        const launchDir = getCannonHorizontalDirection(cannon);
        // 以前の約2倍の発射威力。横方向も上方向も強めます。
        target.body.velocity.set(launchDir.x * 56, 36, launchDir.z * 56);
        target.body.angularVelocity.set(rand(-3, 3), rand(-6, 6), rand(-3, 3));
        target.body.wakeUp();

        // ベロで掴んだまま大砲発射すると、ベロの引っ張り処理で発射が弱まるため解除する。
        if (target.obj && state.lickTarget === target.obj) {
          releaseLick();
        }

        if (target.isPlayer) {
          state.cannonLaunchCount += 1;
        }

        if (target.obj && target.obj.isNPC) {
          incrementCounterMap(state.cannonLaunchByName, target.obj.name || target.name);
        }

        updateMission();

        if (target.obj && target.obj.isNPC) {
          lockNPCAfterCannonLaunch(target.obj);
        }

        cannon.countdownTarget = null;
        cannon.countdownTimer = 0;
        cannon.cooldown = 1.8;
        showMessage("大砲発射！");
        screenShake(0.25, 0.28);
      }
    }

    function updateCannons(delta) {
      for (const cannon of cannons) {
        cannon.cooldown = Math.max(0, (cannon.cooldown || 0) - delta);

        if (state.lickTarget === cannon) {
          const playerPos = cannonToThreeVec3(player.body.position);
          const toPlayer = playerPos.clone().sub(cannon.position);
          toPlayer.y = 0;

          if (toPlayer.lengthSq() > 0.001) {
            const desiredYaw = Math.atan2(toPlayer.x, toPlayer.z);
            cannon.yaw = lerpAngle(cannon.yaw || 0, desiredYaw, 0.18);
          }
        }

        syncCannonVisual(cannon);

        if (cannon.countdownTarget) {
          updateCannonCountdown(cannon, delta);
          continue;
        }

        if (!state.started || cannon.cooldown > 0) continue;

        for (const target of getCannonLaunchTargets()) {
          if (isTargetInsideCannon(cannon, target)) {
            startCannonCountdown(cannon, target);
            break;
          }
        }
      }
    }

    function updateJumpPads(delta) {
      for (const pad of jumpPads) {
        if (!pad || pad.destroyed || !pad.body) continue;

        pad.jumpPadCooldown = Math.max(0, (pad.jumpPadCooldown || 0) - delta);

        const padPos = cannonToThreeVec3(pad.body.position);
        const topY = padPos.y + pad.size.y / 2;

        const targets = [
          { obj: player, body: player.body, power: 31.0, isPlayer: true },
          ...gameObjects
            .filter((obj) => obj !== pad && obj.body && !obj.destroyed && !obj.isCannon)
            .map((obj) => ({
              obj,
              body: obj.body,
              power: obj.isNPC ? 29.0 : 26.0
            }))
        ];

        for (const target of targets) {
          const body = target.body;
          if (!body) continue;

          body._jumpPadCooldown = Math.max(0, (body._jumpPadCooldown || 0) - delta);
          if (body._jumpPadCooldown > 0) continue;

          const pos = cannonToThreeVec3(body.position);
          const halfHeight = getTargetHalfHeight(target);
          const radius = getTargetHorizontalRadius(target);
          const bodyBottomY = pos.y - halfHeight;
          const horizontalDistance = getHorizontalDistance(pos, padPos);
          const nearTop = bodyBottomY >= topY - 0.25 && bodyBottomY <= topY + 0.75;
          const fallingOrStanding = body.velocity.y <= 3.2;
          const triggerRadius = 1.55 + Math.min(radius, 1.4);

          if (horizontalDistance < triggerRadius && nearTop && fallingOrStanding) {
            body.velocity.y = target.power;

            const away = pos.clone().sub(padPos);
            away.y = 0;
            if (away.lengthSq() > 0.001) {
              away.normalize();
              body.velocity.x += away.x * 3.6;
              body.velocity.z += away.z * 3.6;
            }

            body.wakeUp();
            body._jumpPadCooldown = 0.65;
            pad.jumpPadCooldown = 0.2;

            if (target.isPlayer) {
              state.jumpPadLaunchCount += 1;
              updateMission();
            }

            if (target.obj && target.obj.isNPC) {
              target.obj.stunTimer = Math.max(target.obj.stunTimer || 0, 0.9);
              target.obj.isWalking = false;
            }

            showMessage("ジャンプ台で大ジャンプ！");
            break;
          }
        }
      }
    }

    function updateSpawnButton(delta) {
      if (!spawnButton.mesh) return;

      spawnButton.cooldown = Math.max(0, spawnButton.cooldown - delta);
      spawnButton.pressAnim = Math.max(0, spawnButton.pressAnim - delta * 4);

      const playerPos = cannonToThreeVec3(player.body.position);
      const horizontalDistance = Math.hypot(
        playerPos.x - spawnButton.position.x,
        playerPos.z - spawnButton.position.z
      );

      const nearButtonHeight = Math.abs(playerPos.y - spawnButton.position.y) < 2.3;

      if (state.started && spawnButton.cooldown <= 0 && horizontalDistance < 1.75 && nearButtonHeight) {
        spawnButton.cooldown = 1.6;
        spawnButton.pressAnim = 1.0;
        spawnFromButton();
      }

      const top = spawnButton.mesh.userData.top;
      if (top) {
        top.position.y = 0.32 - spawnButton.pressAnim * 0.14;
      }

      const light = spawnButton.mesh.userData.light;
      if (light) {
        light.intensity = 1.3 + spawnButton.pressAnim * 2.6 + Math.sin(clock.elapsedTime * 4) * 0.2;
      }
    }

    // NPCを作る共通関数です。
    // type: "human" または "dog"、speedで移動速度、wanderRadiusで歩き回る範囲を調整します。
    function createNPC(options) {
      const {
        type,
        name,
        position,
        color,
        radius = 0.55,
        height = 1.6,
        speed = 2.2,
        wanderRadius = 12
      } = options;

      const isDog = type === "dog";

      const mesh = isDog
        ? createDogMesh(color)
        : createHumanMesh(color);

      // NPCの物理判定を球ではなく箱にする
      // 球だと地面で転がる/浮く/引っかかるように見えやすいため
      const bodySize = isDog
        ? new THREE.Vector3(0.9, 0.7, 1.1)
        : new THREE.Vector3(0.75, 1.55, 0.75);

      const spawnY = position.y > 1
        ? position.y
        : bodySize.y / 2 + 0.04;
      const spawnPosition = new THREE.Vector3(position.x, spawnY, position.z);

      mesh.position.copy(spawnPosition);
      enableShadowForObject3D(mesh);
      scene.add(mesh);

      const body = new CANNON.Body({
        mass: isDog ? 1.4 : 2.4,
        material: defaultMaterial,
        linearDamping: 0.05,
        angularDamping: 0.95,
        fixedRotation: true,
        shape: new CANNON.Box(
          new CANNON.Vec3(bodySize.x / 2, bodySize.y / 2, bodySize.z / 2)
        )
      });

      body.position.set(spawnPosition.x, spawnPosition.y, spawnPosition.z);
      body.allowSleep = false;
      world.addBody(body);
      body.wakeUp();

      const npc = {
        mesh,
        body,
        size: bodySize.clone(),
        hp: 999999,
        maxHp: 999999,
        score: 0,
        name,
        breakable: false,
        visualType: type,
        colorHex: color,
        destroyed: false,
        isNPC: true,
        npcType: type,

        home: new THREE.Vector3(position.x, 0, position.z),
        target: new THREE.Vector3(position.x, 0, position.z),

        speed,
        wanderRadius,
        waitTimer: rand(0.1, 0.6),
        walkAnimTime: rand(0, 10),
        visualYaw: 0,
        stunTimer: 0,
        retargetTimer: rand(2.0, 4.0),

        // アニメーション判定を物理速度だけに依存させない
        isWalking: false,

        // NPCの見た目だけ上下補正する
        visualYOffset: isDog ? -0.16 : -0.30,

        // 大砲で飛ばされた後、着地するまで自律歩行を止めるための状態
        cannonAirborneLock: false,
        cannonFlightTimer: 0
      };

      body.userData = npc;
      gameObjects.push(npc);
      npcs.push(npc);

      body.addEventListener("collide", (event) => {
        handleNPCCollision(npc, event);
      });

      chooseNewNPCTarget(npc);

      return npc;
    }

    function handleNPCCollision(npc, event) {
      if (!npc || npc.destroyed || !npc.body) return;
      if (!state.started || state.startProtectionTimer > 0) return;

      const otherBody = event.body;
      const otherObj = otherBody ? otherBody.userData : null;

      const hitByPlayer = otherBody === player.body;
      const hitByLickedObject = !!(
        state.lickTarget &&
        state.lickTarget.body &&
        otherBody === state.lickTarget.body
      );

      // 自キャラ、またはベロで掴んで振り回している物が当たった時だけ、
      // NPCの自律移動を一時停止して物理衝突の勢いを残す。
      if (!hitByPlayer && !hitByLickedObject) return;

      const relativeVelocity = Math.abs(event.contact.getImpactVelocityAlongNormal());
      const otherSpeed = otherBody && otherBody.velocity
        ? Math.hypot(otherBody.velocity.x, otherBody.velocity.y, otherBody.velocity.z)
        : 0;
      const impact = Math.max(relativeVelocity, otherSpeed * 0.55);

      // 低速で軽く触れただけの場合は少し押される程度にする。
      if (impact < 1.2) return;

      const npcPos = cannonToThreeVec3(npc.body.position);
      const otherPos = otherBody
        ? cannonToThreeVec3(otherBody.position)
        : npcPos.clone().add(new THREE.Vector3(-1, 0, 0));

      const away = npcPos.clone().sub(otherPos);
      away.y = 0;
      if (away.lengthSq() < 0.0001) {
        away.set(Math.sin(player.visualYaw), 0, Math.cos(player.visualYaw));
      }
      away.normalize();

      const heldObjectMassBonus = hitByLickedObject
        ? clamp((state.lickTarget.body.mass || 1) / 3, 0.8, 2.4)
        : 1;

      const npcTypeBonus = npc.npcType === "dog" ? 1.12 : 1.0;
      const impulsePower = clamp(impact * 1.9 * heldObjectMassBonus * npcTypeBonus, 2.2, 24);
      const upwardPower = clamp(impact * 0.75, 0.7, 8.5);

      npc.stunTimer = clamp(0.45 + impact * 0.16, 0.5, 2.4);
      npc.isWalking = false;
      npc.body.wakeUp();

      npc.body.applyImpulse(
        new CANNON.Vec3(
          away.x * impulsePower,
          upwardPower,
          away.z * impulsePower
        ),
        npc.body.position
      );
    }

    function chooseNewNPCTarget(npc) {
      const angle = rand(0, Math.PI * 2);
      const distance = rand(3, npc.wanderRadius);

      const x = clamp(
        npc.home.x + Math.cos(angle) * distance,
        -46,
        46
      );

      const z = clamp(
        npc.home.z + Math.sin(angle) * distance,
        -46,
        46
      );

      npc.target.set(x, 0, z);
      npc.waitTimer = rand(0.2, 1.2);
    }

    function protectBreakableUntilGrounded(obj, duration = 9.0) {
      if (!obj || !obj.breakable) return;
      obj.spawnProtectedUntilGrounded = true;
      obj.spawnProtectionTimer = duration;
      obj.body.wakeUp();
    }

    function isBreakableSettledOnSurface(obj) {
      if (!obj || !obj.body || !obj.size) return false;

      const from = new CANNON.Vec3(
        obj.body.position.x,
        obj.body.position.y,
        obj.body.position.z
      );

      const rayLength = Math.max(obj.size.y / 2 + 0.45, 0.9);
      const to = new CANNON.Vec3(
        obj.body.position.x,
        obj.body.position.y - rayLength,
        obj.body.position.z
      );

      const ray = new CANNON.Ray(from, to);
      const result = new CANNON.RaycastResult();

      ray.intersectWorld(world, {
        mode: CANNON.Ray.CLOSEST,
        result,
        skipBackfaces: false
      });

      return result.hasHit &&
        result.body !== obj.body &&
        Math.abs(obj.body.velocity.y) < 1.4;
    }

    function updateBreakableSpawnProtection(obj, delta) {
      if (!obj || !obj.spawnProtectedUntilGrounded) return;

      obj.spawnProtectionTimer = Math.max(0, (obj.spawnProtectionTimer || 0) - delta);

      if (isBreakableSettledOnSurface(obj) || obj.spawnProtectionTimer <= 0) {
        obj.spawnProtectedUntilGrounded = false;
        obj.spawnProtectionTimer = 0;
      }
    }

      pedestal.position.set(0, -0.96, 0);

    function createLegendarySword(position = new THREE.Vector3(36, 11.25, 28)) {
      const mesh = createLegendarySwordMesh();
      mesh.position.copy(position);
      enableShadowForObject3D(mesh);
      scene.add(mesh);

      const bodySize = new THREE.Vector3(0.75, 2.45, 0.75);
      const body = new CANNON.Body({
        mass: 1.2,
        material: defaultMaterial,
        linearDamping: 0.28,
        angularDamping: 0.85,
        fixedRotation: true,
        shape: new CANNON.Box(new CANNON.Vec3(bodySize.x / 2, bodySize.y / 2, bodySize.z / 2))
      });

      body.position.set(position.x, position.y, position.z);
      body.allowSleep = false;
      world.addBody(body);
      body.wakeUp();

      const sword = {
        mesh,
        body,
        size: bodySize,

        breakable: false,
        visualType: "legendarySword",
        colorHex: 0x77ddff,
        destroyed: false,

        initialSpawnPosition: position.clone(),
        respawnHeightOffset: 12,

    // 家オブジェクトの調整値です。
    // HOUSE_COLLAPSE_IMPACT_THRESHOLD を上げるほど、ただ触れただけでは崩れにくくなります。
    // HOUSE_PART_HP_MULTIPLIER を上げるほど、崩れた後の壁・屋根パーツが壊れにくくなります。
    const HOUSE_COLLAPSE_IMPACT_THRESHOLD = 68;
    const HOUSE_PART_HP_MULTIPLIER = 10;

    // 車オブジェクトの調整値です。
    // 頭突き1回で壊れないよう、頭突きダメージは固定寄りにし、
    // 頭突き後の地面・壁への衝突ダメージは控えめに制限します。
    const CAR_HEADBUTT_DAMAGE = 150;
    const CAR_HEADBUTT_DAMAGE_LEGENDARY = 260;
    const CAR_COLLISION_DAMAGE_THRESHOLD = 18;
    const CAR_COLLISION_DAMAGE_MULTIPLIER = 0.12;
    const CAR_COLLISION_DAMAGE_CAP = 45;
    const CAR_HEADBUTT_FORWARD_MULTIPLIER = 1.45;
    const CAR_HEADBUTT_UPWARD_IMPULSE = 1.2;

    // 家の見た目を作る関数です。
    // 初回衝撃まではこのGroupのまま家の形を維持し、衝撃後に壁・屋根パーツへ分解します。
    function createHouseMesh(size, color = 0xf2d19b) {
      const group = new THREE.Group();

      const wallMat = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.78,
        metalness: 0.02
      });

      const roofMat = new THREE.MeshStandardMaterial({
        color: 0x9b3b2f,
        roughness: 0.72,
        metalness: 0.02
      });

      const doorMat = new THREE.MeshStandardMaterial({
        color: 0x5c3518,
        roughness: 0.85
      });

      const windowMat = new THREE.MeshStandardMaterial({
        color: 0x93dfff,
        roughness: 0.25,
        metalness: 0.05,
        emissive: 0x153344,
        emissiveIntensity: 0.12
      });

      const bodyHeight = size.y * 0.72;
      const wallThickness = 0.18;
      const wallY = -size.y / 2 + bodyHeight / 2;

      function addBox(name, boxSize, pos, mat) {
        const mesh = new THREE.Mesh(
          new THREE.BoxGeometry(boxSize.x, boxSize.y, boxSize.z),
          mat
        );
        mesh.position.copy(pos);
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        mesh.userData.partName = name;
        group.add(mesh);
        return mesh;
      }

      addBox("frontWall", new THREE.Vector3(size.x, bodyHeight, wallThickness), new THREE.Vector3(0, wallY, -size.z / 2), wallMat);
      addBox("backWall", new THREE.Vector3(size.x, bodyHeight, wallThickness), new THREE.Vector3(0, wallY, size.z / 2), wallMat);
      addBox("leftWall", new THREE.Vector3(wallThickness, bodyHeight, size.z), new THREE.Vector3(-size.x / 2, wallY, 0), wallMat);
      addBox("rightWall", new THREE.Vector3(wallThickness, bodyHeight, size.z), new THREE.Vector3(size.x / 2, wallY, 0), wallMat);

      // 屋根は、左右2枚の板をX方向に傾けて三角屋根にする。
      // Z方向にずらすと、見る角度によって屋根が交差して見えるため、左右ともZ=0にそろえる。
      const roofAngle = 0.52;
      const roofPanelSize = new THREE.Vector3(size.x * 0.68, 0.24, size.z * 1.18);
      const roofY = -size.y / 2 + bodyHeight + 0.45;
      const roofX = size.x * 0.28;
      const roofLeft = addBox("roofLeft", roofPanelSize, new THREE.Vector3(-roofX, roofY, 0), roofMat);
      // 左屋根は中心側が高くなる向きに傾ける。
      roofLeft.rotation.z = roofAngle;
      const roofRight = addBox("roofRight", roofPanelSize, new THREE.Vector3(roofX, roofY, 0), roofMat);
      // 右屋根は中心側が高くなる向きに傾ける。
      roofRight.rotation.z = -roofAngle;

      // 屋根の頂点に細い棟を追加して、家らしい形に見えるようにする。
      addBox("roofRidge", new THREE.Vector3(0.22, 0.22, size.z * 1.22), new THREE.Vector3(0, roofY + 0.34, 0), roofMat);

      addBox("door", new THREE.Vector3(0.75, 1.25, 0.06), new THREE.Vector3(-0.65, -size.y / 2 + 0.62, -size.z / 2 - 0.04), doorMat);
      addBox("windowL", new THREE.Vector3(0.58, 0.48, 0.06), new THREE.Vector3(0.35, -size.y / 2 + 1.25, -size.z / 2 - 0.045), windowMat);
      addBox("windowR", new THREE.Vector3(0.58, 0.48, 0.06), new THREE.Vector3(1.1, -size.y / 2 + 1.25, -size.z / 2 - 0.045), windowMat);

      group.userData.houseSize = size.clone();
      return group;
    }

    function createHousePart({ position, size, color, mass, hp, score, name, rotation = null, impulse = null }) {
      const part = createDynamicBox({
        position,
        size,
        color,
        mass,
        hp,
        score,
        name,
        breakable: true
      });

      if (rotation) {
        part.body.quaternion.setFromEuler(rotation.x, rotation.y, rotation.z);
        part.mesh.quaternion.set(part.body.quaternion.x, part.body.quaternion.y, part.body.quaternion.z, part.body.quaternion.w);
      }

      if (impulse) {
        part.body.wakeUp();
        part.body.applyImpulse(threeToCannonVec3(impulse), part.body.position);
        part.body.angularVelocity.set(rand(-0.9, 0.9), rand(-0.9, 0.9), rand(-0.9, 0.9));
      }

      return part;
    }

    function collapseHouse(obj, impactPower = 16) {
      if (obj.destroyed || obj.collapsed) return;
      obj.collapsed = true;
      obj.destroyed = true;

      state.destroyedCount += 1;
      state.destroyedByName[obj.name] = (state.destroyedByName[obj.name] || 0) + 1;
      addScore(obj.score + impactPower * 2, obj.mesh.position);

      const basePos = obj.mesh.position.clone();
      const baseQuat = obj.mesh.quaternion.clone();
      const size = obj.size.clone();
      const bodyHeight = size.y * 0.72;
      const wallThickness = 0.18;
      const wallColor = obj.colorHex ?? 0xf2d19b;
      const roofColor = 0x9b3b2f;
      const roofAngle = 0.52;
      const roofPanelSize = new THREE.Vector3(size.x * 0.68, 0.24, size.z * 1.18);
      const roofY = -size.y / 2 + bodyHeight + 0.45;
      const roofX = size.x * 0.28;

      scene.remove(obj.mesh);
      world.removeBody(obj.body);

      const idx = gameObjects.indexOf(obj);
      if (idx >= 0) gameObjects.splice(idx, 1);
      const dIdx = destructibles.indexOf(obj);
      if (dIdx >= 0) destructibles.splice(dIdx, 1);

      function localToWorld(local) {
        return local.clone().applyQuaternion(baseQuat).add(basePos);
      }

      const parts = [
        { name: "家の前壁", size: new THREE.Vector3(size.x, bodyHeight, wallThickness), local: new THREE.Vector3(0, -size.y / 2 + bodyHeight / 2, -size.z / 2), color: wallColor, hp: 110 * HOUSE_PART_HP_MULTIPLIER, score: 95, rot: new THREE.Vector3(0, 0, 0), imp: new THREE.Vector3(0, 0.9, -1.15) },
        { name: "家の後壁", size: new THREE.Vector3(size.x, bodyHeight, wallThickness), local: new THREE.Vector3(0, -size.y / 2 + bodyHeight / 2, size.z / 2), color: wallColor, hp: 110 * HOUSE_PART_HP_MULTIPLIER, score: 95, rot: new THREE.Vector3(0, 0, 0), imp: new THREE.Vector3(0, 0.9, 1.15) },
        { name: "家の左壁", size: new THREE.Vector3(wallThickness, bodyHeight, size.z), local: new THREE.Vector3(-size.x / 2, -size.y / 2 + bodyHeight / 2, 0), color: wallColor, hp: 110 * HOUSE_PART_HP_MULTIPLIER, score: 95, rot: new THREE.Vector3(0, 0, 0), imp: new THREE.Vector3(-1.15, 0.9, 0) },
        { name: "家の右壁", size: new THREE.Vector3(wallThickness, bodyHeight, size.z), local: new THREE.Vector3(size.x / 2, -size.y / 2 + bodyHeight / 2, 0), color: wallColor, hp: 110 * HOUSE_PART_HP_MULTIPLIER, score: 95, rot: new THREE.Vector3(0, 0, 0), imp: new THREE.Vector3(1.15, 0.9, 0) },
        { name: "家の屋根", size: roofPanelSize.clone(), local: new THREE.Vector3(-roofX, roofY, 0), color: roofColor, hp: 140 * HOUSE_PART_HP_MULTIPLIER, score: 130, rot: new THREE.Vector3(0, 0, roofAngle), imp: new THREE.Vector3(-0.9, 1.25, 0) },
        { name: "家の屋根", size: roofPanelSize.clone(), local: new THREE.Vector3(roofX, roofY, 0), color: roofColor, hp: 140 * HOUSE_PART_HP_MULTIPLIER, score: 130, rot: new THREE.Vector3(0, 0, -roofAngle), imp: new THREE.Vector3(0.9, 1.25, 0) },
        { name: "家の屋根の棟", size: new THREE.Vector3(0.22, 0.22, size.z * 1.22), local: new THREE.Vector3(0, roofY + 0.34, 0), color: roofColor, hp: 120 * HOUSE_PART_HP_MULTIPLIER, score: 90, rot: new THREE.Vector3(0, 0, 0), imp: new THREE.Vector3(0, 1.15, 0) }
      ];

      for (const partData of parts) {
        // 初回衝撃では「爆発」ではなく、家の形が少し崩れる程度に抑える。
        const impulse = partData.imp.clone().multiplyScalar(Math.min(1.8, Math.max(0.8, impactPower / 24)));
        createHousePart({
          position: localToWorld(partData.local),
          size: partData.size,
          color: partData.color,
          mass: partData.name.includes("屋根") ? 1.4 : 1.1,
          hp: partData.hp,
          score: partData.score,
          name: partData.name,
          rotation: partData.rot,
          impulse
        });
      }

      showMessage("家が崩れた！");
    }

    // 破壊可能/移動可能な物理オブジェクトを作る共通関数です。
    // options.position   : 初期位置
    // options.size       : サイズ
    // options.color      : 色
    // options.mass       : 重さ。大きいほど動きにくいです。
    // options.hp         : 耐久値。大きいほど壊れにくいです。
    // options.score      : 破壊時のスコア
    // options.name       : 「箱」「板」「車っぽい物体」などの名前
    // options.breakable  : trueなら破壊可能、falseなら破壊不能
    // options.visualType : 見た目タイプ。box/car/dangerBox/legendarySword など
    function createDynamicBox(options) {
      const {
        position,
        size,
        color,
        mass = 1,
        hp = 50,
        score = 50,
        name = "box",
        breakable = true,
        visualType = "box"
      } = options;

      let mesh;

      if (visualType === "car") {
        mesh = createCarMesh(size, color);
      } else if (visualType === "jumpPad") {
        mesh = createJumpPadMesh(size, color);
      } else if (visualType === "houseIntact") {
        mesh = createHouseMesh(size, color);
      } else if (visualType === "dangerBox") {
        mesh = createDangerBoxMesh(size, color);
      } else {
          let objectTexture = null;

          if (name === "箱") {
            objectTexture = textures.cardboard;
          } else if (name === "板") {
            objectTexture = textures.board;
          }

          mesh = new THREE.Mesh(
            new THREE.BoxGeometry(size.x, size.y, size.z),
            new THREE.MeshStandardMaterial({
              map: objectTexture,
              color: objectTexture ? 0xffffff : color,
              roughness: 0.72,
              metalness: 0.02
            })
          );

        mesh.castShadow = true;
        mesh.receiveShadow = true;
      }

      mesh.position.copy(position);
      enableShadowForObject3D(mesh);
      scene.add(mesh);

      const body = new CANNON.Body({
        mass,
        material: defaultMaterial,
        linearDamping: 0.08,
        angularDamping: 0.06,
        shape: new CANNON.Box(new CANNON.Vec3(size.x / 2, size.y / 2, size.z / 2))
      });

      body.position.set(position.x, position.y, position.z);
      body.allowSleep = true;
      body.sleepSpeedLimit = 0.15;
      body.sleepTimeLimit = 0.6;
      world.addBody(body);

      const obj = {
        mesh,
        body,
        size,
        hp,
        maxHp: hp,
        score,
        name,
        breakable,
        visualType,
        colorHex: color,
        // 車はタイヤが地面に埋まりやすいため、見た目だけ少し上に補正する
        visualYOffset: visualType === "car" ? size.y * 0.28 : 0,
        spawnProtectedUntilGrounded: false,
        spawnProtectionTimer: 0,
        destroyed: false,
        lastHitTime: 0
      };

      if (visualType === "jumpPad") {
        obj.isJumpPad = true;
        obj.jumpPadCooldown = 0;
        // スポーン時は上向きのまま出すが、その後は他の物体と同じく物理演算で回転させる。
        // fixedRotation=true のままだと、大砲で発射した後に斜め向きで固定されることがあるため解除する。
        obj.body.fixedRotation = false;
        obj.body.quaternion.set(0, 0, 0, 1);
        obj.body.linearDamping = 0.55;
        obj.body.angularDamping = 0.18;
        obj.body.updateMassProperties();
        jumpPads.push(obj);
      }

      body.userData = obj;
      gameObjects.push(obj);
      if (breakable) {
        destructibles.push(obj);
      }

      body.addEventListener("collide", (event) => {
        handleObjectCollision(obj, event);
      });

      return obj;
    }

    function handleObjectCollision(obj, event) {
      if (!obj.breakable || obj.destroyed) return;

      // ゲーム開始直後は、落下による初期衝突で破壊・スコア加算しない
      if (state.startProtectionTimer > 0) {
        return;
      }

      // 高い位置から再出現・スポーンした破壊可能オブジェクトは、
      // 地面や足場に落ち着くまでは壊れないようにする
      if (obj.spawnProtectedUntilGrounded) {
        return;
      }

      // ベロでつかんでいる間は、地面や他オブジェクトにぶつかっても壊れない
      // ベロを離した後は通常どおり壊れる
      if (state.lickTarget === obj) {
        return;
      }

      const relativeVelocity = event.contact.getImpactVelocityAlongNormal();
      const impact = Math.abs(relativeVelocity) * obj.body.mass;

      if (obj.visualType === "houseIntact") {
        if (impact > HOUSE_COLLAPSE_IMPACT_THRESHOLD) {
          collapseHouse(obj, impact);
        }
        return;
      }

      const isCar = obj.visualType === "car";
      const damageThreshold = isCar ? CAR_COLLISION_DAMAGE_THRESHOLD : 9;

      if (impact > damageThreshold) {
        let collisionDamage = isCar
          ? impact * CAR_COLLISION_DAMAGE_MULTIPLIER
          : impact * 0.7;

        // 車は頭突き後に地面や壁へ当たった追加衝撃だけで即破壊されないよう、
        // 衝突1回あたりの削り量に上限をかける。
        if (isCar) {
          collisionDamage = Math.min(collisionDamage, CAR_COLLISION_DAMAGE_CAP);
        }

        obj.hp -= collisionDamage;

        // 衝突しただけではスコア加算しない。
        // スコアは破壊時の destroyObject 側でのみ加算する。
        if (obj.hp <= 0) {
          destroyObject(obj, impact);
        }
      }
    }

    function destroyObject(obj, impactPower = 16) {
      if (obj.destroyed) return;
      obj.destroyed = true;

      state.destroyedCount += 1;
      state.destroyedByName[obj.name] = (state.destroyedByName[obj.name] || 0) + 1;

      addScore(obj.score + impactPower * 2, obj.mesh.position);

      const basePos = obj.mesh.position.clone();
      const baseColor = new THREE.Color(obj.colorHex ?? 0xffffff);

      scene.remove(obj.mesh);
      world.removeBody(obj.body);

      // 元配列から削除
      const idx = gameObjects.indexOf(obj);
      if (idx >= 0) gameObjects.splice(idx, 1);

      const dIdx = destructibles.indexOf(obj);
      if (dIdx >= 0) destructibles.splice(dIdx, 1);

      // 破片を生成
      const pieceCount = clamp(Math.floor(rand(4, 8)), 4, 8);
      for (let i = 0; i < pieceCount; i++) {
        const s = rand(0.25, 0.55);
        const piece = createDynamicBox({
          position: new THREE.Vector3(
            basePos.x + rand(-0.25, 0.25),
            basePos.y + rand(0, 0.35),
            basePos.z + rand(-0.25, 0.25)
          ),
          size: new THREE.Vector3(s, s, s),
          color: baseColor.getHex(),
          mass: 0.25,
          hp: 9999,
          score: 0,
          name: "debris",
          breakable: false
        });

        piece.body.velocity.set(rand(-3, 3), rand(3, 7), rand(-3, 3));
        piece.body.angularVelocity.set(rand(-8, 8), rand(-8, 8), rand(-8, 8));

        setTimeout(() => {
          if (piece.mesh.parent) scene.remove(piece.mesh);
          if (piece.body.world) world.removeBody(piece.body);

          const pIdx = gameObjects.indexOf(piece);
          if (pIdx >= 0) gameObjects.splice(pIdx, 1);
        }, 8000);
      }

      showMessage(`${obj.name}を破壊！`);
    }

    // ゲーム開始時に最初から配置される破壊可能オブジェクトを作ります。
    // 個数、位置、サイズ、hp、score を調整したい場合はこの関数内を変更します。
    function createObjects() {
      // 箱エリア
      for (let i = 0; i < 34; i++) {
        createDynamicBox({
          position: new THREE.Vector3(rand(-52, 52), rand(1, 8), rand(-52, 52)),
          size: new THREE.Vector3(rand(0.8, 1.7), rand(0.8, 1.7), rand(0.8, 1.7)),
          color: [0xc98b43, 0x7cc0ff, 0xffd36b, 0xff8aad, 0xb493ff][i % 5],
          mass: rand(0.7, 2.2),
          hp: rand(35, 75),
          score: 50,
          name: "箱",
          breakable: true
        });
      }

      // 車風オブジェクト
      // i < 5 の 5 が車の初期配置数です。hpが高いほど壊れにくいです。
      for (let i = 0; i < 5; i++) {
        createDynamicBox({
          position: new THREE.Vector3(-18 + rand(-3, 3), 1.0, -30 + i * 14),
          size: new THREE.Vector3(2.8, 1.0, 4.5),
          color: [0xff5544, 0x4477ff, 0xffff66, 0x66ff99, 0xffffff][i % 5],
          mass: 5,
          // 車は通常の頭突き5回前後で壊れる程度にする
          hp: 720,
          score: 220,
          name: "車っぽい物体",
          breakable: true,
          visualType: "car"
        });
      }

      // 板オブジェクト
      // i < 10 の 10 が板の初期配置数です。
      // 破壊不能の固定看板と区別するため、名称は「板」にする
      for (let i = 0; i < 16; i++) {
        createDynamicBox({
          position: new THREE.Vector3(rand(-58, 58), 1.4, rand(-58, 58)),
          size: new THREE.Vector3(0.35, 2.4, 1.4),
          color: 0xffee55,
          mass: 1.2,
          hp: 45,
          score: 80,
          name: "板",
          breakable: true
        });
      }

      // あやしい赤箱
      // 通常の赤い箱ではなく、発光・！マーク付きで目立つようにする
      const dangerPositions = [
        new THREE.Vector3(8, 1.2, -18),
        new THREE.Vector3(-8, 1.2, 18),
        new THREE.Vector3(24, 1.2, 4),
        new THREE.Vector3(-26, 1.2, -4),
        new THREE.Vector3(48, 1.2, 44),
        new THREE.Vector3(-50, 1.2, 46)
      ];
